    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6200; --orange-light: #FFF0E6;
      --blue: #003087; --blue-light: #E6EBF5;
      --bg: #ffffff; --bg2: #f5f5f5; --bg3: #ececec;
      --text: #1a1a1a; --text2: #666666; --text3: #999999;

      --red: #A32D2D; --red-bg: #FCEBEB;
      --amber: #854F0B; --amber-bg: #FAEEDA;
      --gold: #B8860B; --gold-bg: #FFF8E1;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e; --bg2: #2a2a2a; --bg3: #333333;
        --text: #f0f0f0; --text2: #aaaaaa; --text3: #777777;
        --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.20);
        --blue-light: #0d1f3c; --orange-light: #3a1f0a;
        --green-bg: #1a2e0a; --red-bg: #2e1010;
        --amber-bg: #2e1e08; --gold-bg: #2a2000;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    #app { max-width: 900px; margin: 0 auto; padding-bottom: 3rem; }

    /* ── Header ── */
    .header { background: var(--blue); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .header-left { display: flex; flex-direction: column; }
    .header-logo { font-size: 22px; font-weight: 700; color: var(--orange); letter-spacing: -0.5px; }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }
    .header-week { background: var(--orange); color: white; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: var(--radius); }

    /* ── Nav ── */
    .nav { display: flex; gap: 8px; padding: 0 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .nav-btn { padding: 8px 18px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .nav-btn.active { background: var(--orange); border-color: var(--orange); color: white; }
    .nav-btn:hover:not(.active) { background: var(--bg2); }

    /* ── Container & Cards ── */
    .container { padding: 0 1.5rem; }
    .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }

    /* ── Badges ── */
    .week-badge { display: inline-block; background: var(--orange); color: white; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: var(--radius); margin-bottom: 0.75rem; }
    .cat-badge { display: inline-block; background: var(--blue-light); color: var(--blue); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: var(--radius); margin-bottom: 0.75rem; margin-left: 6px; }

    /* ── Quiz options ── */
    .question-text { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 1rem; line-height: 1.5; }
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; font-size: 14px; color: var(--text); background: var(--bg); text-align: left; width: 100%; line-height: 1.4; }
    .option:hover { background: var(--bg2); border-color: var(--border2); }
    .option.selected { border-color: var(--orange); background: var(--orange-light); }
    .option-letter { font-weight: 700; min-width: 20px; color: var(--orange); font-size: 13px; flex-shrink: 0; margin-top: 1px; }
    .option.selected .option-letter { color: var(--orange); }

    /* ── Buttons ── */
    .submit-btn { background: var(--orange); color: white; border: none; border-radius: var(--radius); padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 1rem; width: 100%; transition: opacity 0.15s; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .submit-btn:hover:not(:disabled) { opacity: 0.88; }

    /* ── Identity box ── */
    .identity-box { background: var(--blue-light); border: 1px solid var(--blue); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
    .identity-box h2 { font-size: 17px; font-weight: 600; color: var(--blue); margin-bottom: 0.5rem; }
    .identity-box p { font-size: 13px; color: var(--text2); margin-bottom: 1rem; }
    input[type=email], input[type=text] { width: 100%; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border2); font-size: 14px; background: var(--bg); color: var(--text); margin-bottom: 10px; outline: none; }
    input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,98,0,0.12); }

    /* ── Progress ── */
    .progress-bar { background: var(--bg2); border-radius: 4px; height: 6px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--orange); border-radius: 4px; transition: width 0.3s; }

    /* ── Summary metrics ── */
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .metric { background: var(--bg2); border-radius: var(--radius); padding: 1rem; text-align: center; }
    .metric-val { font-size: 24px; font-weight: 700; color: var(--text); }
    .metric-label { font-size: 11px; color: var(--text2); margin-top: 4px; }

    /* ── Filters ── */
    .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    select { padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border2); font-size: 13px; background: var(--bg); color: var(--text); cursor: pointer; }

    /* ── Result rows ── */
    .result-row { border-bottom: 1px solid var(--border); padding: 0.85rem 0; }
    .result-row:last-child { border-bottom: none; }
    .result-q { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .result-meta { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .result-correct { color: var(--green); font-weight: 600; }
    .result-wrong { color: var(--red); font-weight: 600; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .dot-green { background: var(--green); }
    .dot-red { background: var(--red); }
    .explanation-box { background: var(--bg2); border-radius: var(--radius); padding: 8px 12px; margin-top: 6px; font-size: 12px; color: var(--text2); line-height: 1.6; }

    /* ── Leaderboard ── */
    .leaderboard { width: 100%; border-collapse: collapse; }
    .leaderboard th { background: var(--blue); color: white; padding: 10px 14px; text-align: left; font-weight: 600; font-size: 13px; }
    .leaderboard td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    .leaderboard tr:hover td { background: var(--bg2); }
    .leaderboard tr.me td { background: var(--orange-light); font-weight: 600; }
    .rank-medal { font-size: 18px; }
    .score-bar-wrap { background: var(--bg3); border-radius: 4px; height: 8px; min-width: 80px; overflow: hidden; }
    .score-bar-fill { height: 100%; background: var(--orange); border-radius: 4px; transition: width 0.4s; }

    /* ── Admin table ── */
    .admin-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .admin-table th { background: var(--blue); color: white; padding: 8px 10px; text-align: left; font-weight: 600; white-space: nowrap; }
    .admin-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .admin-table tr:hover td { background: var(--bg2); }
    .correct-tag { background: var(--green-bg); color: var(--green); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: var(--radius); display: inline-block; white-space: nowrap; }

    /* ── Messages ── */
    .not-started { background: var(--blue-light); border-radius: var(--radius-lg); padding: 2.5rem; text-align: center; }
    .not-started h2 { font-size: 20px; font-weight: 700; color: var(--blue); margin-bottom: 0.5rem; }
    .not-started p { font-size: 14px; color: var(--text2); }
    .info-msg { background: var(--bg2); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--text2); margin-bottom: 1rem; }
    .success-msg { background: var(--green-bg); border: 1px solid #97C459; border-radius: var(--radius); padding: 12px 16px; font-size: 14px; color: var(--green); margin-bottom: 1rem; font-weight: 600; }
    .error-msg { background: var(--red-bg); border: 1px solid #f09595; border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--red); margin-bottom: 1rem; }
    .resubmit-note { background: var(--amber-bg); border: 1px solid #EF9F27; border-radius: var(--radius); padding: 10px 14px; font-size: 13px; color: var(--amber); margin-bottom: 1rem; }
    .config-box { background: var(--amber-bg); border: 2px dashed #EF9F27; border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
    .config-box h3 { font-size: 15px; font-weight: 700; color: var(--amber); margin-bottom: 0.5rem; }
    .config-box p { font-size: 13px; color: var(--text2); margin-bottom: 0.75rem; line-height: 1.6; }
    .config-box code { background: var(--bg3); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; color: var(--text); }

    /* ── Tab row ── */
    .tab-row { display: flex; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .tab-btn { padding: 8px 18px; border: none; background: none; cursor: pointer; font-size: 14px; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); font-weight: 600; }

    /* ── Loading spinner ── */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

/* ═══════════════════════════════════════════════════════════════
   SUPABASE API HELPERS
   ═══════════════════════════════════════════════════════════════ */
const isConfigured = () => SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';

async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function getSubmission(email, week) {
  if (!isConfigured()) return getLocalSubmission(email, week);
  try {
    const rows = await sbFetch(`quiz_submissions?email=eq.${encodeURIComponent(email)}&week=eq.${week}&select=answers`);
    return rows.length ? rows[0].answers : null;
  } catch(e) { return getLocalSubmission(email, week); }
}

async function saveSubmission(email, week, answers) {
  saveLocalSubmission(email, week, answers);
  if (!isConfigured()) return;
  try {
    await sbFetch('quiz_submissions', {
      method: 'POST',
      prefer: 'resolution=merge-duplicates,return=representation',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: { email, week, answers, submitted_at: new Date().toISOString() }
    });
  } catch(e) { console.warn('Supabase save failed, stored locally only:', e.message); }
}

async function getLeaderboard() {
  if (!isConfigured()) return buildLocalLeaderboard();
  try {
    const rows = await sbFetch('quiz_submissions?select=email,week,answers&order=week.asc');
    return buildLeaderboardFromRows(rows);
  } catch(e) { return buildLocalLeaderboard(); }
}

async function getAllSubmissionsAdmin() {
  if (!isConfigured()) return buildLocalAdminRows();
  try {
    const rows = await sbFetch('quiz_submissions?select=email,week,answers,submitted_at&order=week.asc,email.asc');
    return rows;
  } catch(e) { return buildLocalAdminRows(); }
}

/* ── Local storage fallbacks ── */
function getLocalStorage() {
  try { const r = localStorage.getItem('mxquiz_v2'); return r ? JSON.parse(r) : {submissions:{}}; }
  catch(e) { return {submissions:{}}; }
}
function saveLocalStorage(d) { try { localStorage.setItem('mxquiz_v2', JSON.stringify(d)); } catch(e){} }
function getLocalSubmission(email, week) {
  const d = getLocalStorage(); return d.submissions[email+'_w'+week] || null;
}
function saveLocalSubmission(email, week, answers) {
  const d = getLocalStorage(); d.submissions[email+'_w'+week] = answers; saveLocalStorage(d);
  const pk = 'u_'+(navigator.userAgent||'').replace(/\W/g,'').slice(0,20);
  if (!d.participants) d.participants = {}; d.participants[pk] = email; saveLocalStorage(d);
}
function buildLocalLeaderboard() {
  const d = getLocalStorage();
  const map = {};
  Object.entries(d.submissions||{}).forEach(([key, answers]) => {
    const [email, wPart] = key.split('_w'); const week = parseInt(wPart);
    const qs = getWeekQuestions(week);
    const correct = qs.filter((q,i) => answers[i] === q.correct).length;
    if (!map[email]) map[email] = {email, total:0, correct:0, weeks:[]};
    map[email].total += qs.length; map[email].correct += correct; map[email].weeks.push(week);
  });
  return Object.values(map).sort((a,b) => b.correct - a.correct);
}
function buildLeaderboardFromRows(rows) {
  const map = {};
  rows.forEach(r => {
    const qs = getWeekQuestions(r.week);
    const correct = qs.filter((q,i) => r.answers[i] === q.correct).length;
    if (!map[r.email]) map[r.email] = {email:r.email, total:0, correct:0, weeks:[]};
    map[r.email].total += qs.length; map[r.email].correct += correct; map[r.email].weeks.push(r.week);
  });
  return Object.values(map).sort((a,b) => b.correct - a.correct);
}
function buildLocalAdminRows() {
  const d = getLocalStorage();
  return Object.entries(d.submissions||{}).map(([key, answers]) => {
    const [email, wPart] = key.split('_w');
    return {email, week: parseInt(wPart), answers, submitted_at: null};
  });
}

/* ═══════════════════════════════════════════════════════════════
   QUIZ HELPERS
   ═══════════════════════════════════════════════════════════════ */
function getCurrentWeek() {
  const diff = new Date() - QUIZ_START;
  if (diff < 0) return 0;
  return Math.min(Math.floor(diff / (7*24*3600*1000)) + 1, QUIZ_WEEKS);
}
function getWeekQuestions(w) { return QUESTIONS.filter(q => q.week === w); }
function getParticipantKey() { return 'u_'+(navigator.userAgent||'').replace(/\W/g,'').slice(0,20); }
function tryAutoEmail() {
  try {
    const d = getLocalStorage();
    const pk = getParticipantKey();
    if (d.participants && d.participants[pk]) return d.participants[pk];
  } catch(e) {}
  return '';
}

   APP STATE
   ═══════════════════════════════════════════════════════════════ */
let state = {
  page: 'quiz', email: '', confirmedEmail: tryAutoEmail(),
  currentWeek: getCurrentWeek(),
  answers: {}, loading: false,
  adminTab: 'questions', filterWeek: 0, filterCat: '', sortField: 'week',
  isAdmin: location.search.includes('admin=true'),
  successMsg: '', errorMsg: '',
  leaderboard: null, adminRows: null
};

/* ═══════════════════════════════════════════════════════════════
   RENDER ENGINE
   ═══════════════════════════════════════════════════════════════ */
function render() {
  const root = document.getElementById('root');
  if (!root) return;
  root.innerHTML = '';

  const wl = document.getElementById('header-week-label');
  if (wl) wl.textContent = state.currentWeek > 0 ? 'Week ' + state.currentWeek + ' of ' + QUIZ_WEEKS : 'Starting soon';

  const nav = document.createElement('div'); nav.className = 'nav';
  const pages = [['quiz','Quiz'],['results','My Results'],['leaderboard','Leaderboard']];
  if (state.isAdmin) pages.push(['admin','Admin']);
  pages.forEach(([id,label]) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn'+(state.page===id?' active':'');
    btn.textContent = label;
    btn.onclick = () => { state.page=id; state.successMsg=''; state.errorMsg=''; render(); };
    nav.appendChild(btn);
  });
  root.appendChild(nav);
  const container = document.createElement('div'); container.className='container';
  root.appendChild(container);

  if (state.page==='quiz') renderQuiz(container);
  else if (state.page==='results') renderResults(container);
  else if (state.page==='leaderboard') renderLeaderboard(container);
  else renderAdmin(container);
}

/* ── Identity box ── */
function renderIdentityBox(container, onConfirm) {
  if (state.confirmedEmail) { onConfirm(); return; }
  const box = document.createElement('div'); box.className='identity-box';
  box.innerHTML = '<h2>Welcome to the PostNL Mendix Quiz</h2><p>Enter your PostNL email address to participate. Your answers are saved centrally so you can access results from any device.</p>';
  const inp = document.createElement('input'); inp.type='email';
  inp.placeholder='your.name@postnl.nl'; inp.value=state.email||'';
  inp.oninput = e => state.email=e.target.value;
  inp.onkeydown = e => { if(e.key==='Enter') doConfirm(); };
  const btn = document.createElement('button'); btn.className='submit-btn';
  btn.textContent='Start'; btn.style.cssText='width:auto;padding:8px 24px;margin-top:0';
  function doConfirm() {
    if (state.email && state.email.includes('@')) { state.confirmedEmail=state.email; render(); }
    else alert('Please enter a valid email address.');
  }
  btn.onclick = doConfirm;
  box.appendChild(inp); box.appendChild(btn); container.appendChild(box);
}

/* ── Supabase config notice ── */
function maybeShowConfigNotice(container) {
  if (isConfigured()) return;
  const box = document.createElement('div'); box.className='config-box';
  box.innerHTML = `
    <h3>Supabase not yet configured</h3>
    <p>The quiz is running in <strong>local browser storage mode</strong>. Answers are saved only on this device and the leaderboard only reflects local data.</p>
    <p>To enable the live leaderboard and cross-device sync, open <code>index.html</code> in a text editor, find the two lines near the top and replace the placeholder values:</p>
    <p><code>const SUPABASE_URL = 'YOUR_SUPABASE_URL';</code><br>
    <code>const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';</code></p>
    <p>See the README for step-by-step Supabase setup instructions.</p>
  `;
  container.appendChild(box);
}

/* ── Quiz page ── */
function renderQuiz(container) {
  maybeShowConfigNotice(container);
  renderIdentityBox(container, async () => {
    const cw = state.currentWeek;
    if (cw===0) {
      const msg=document.createElement('div'); msg.className='not-started';
      msg.innerHTML='<h2>Quiz starts March 23, 2026</h2><p>Week 1 questions will be available from Monday, March 23. Come back then!</p>';
      container.appendChild(msg); return;
    }
    if (state.successMsg) { const s=document.createElement('div'); s.className='success-msg'; s.textContent=state.successMsg; container.appendChild(s); }
    if (state.errorMsg) { const e=document.createElement('div'); e.className='error-msg'; e.textContent=state.errorMsg; container.appendChild(e); }

    if (!state.answers[cw]) {
      const loading=document.createElement('div'); loading.className='info-msg';
      loading.innerHTML='<span class="spinner"></span>Loading your answers...';
      container.appendChild(loading);
      const existing = await getSubmission(state.confirmedEmail, cw);
      container.removeChild(loading);
      if (existing) {
        state.answers[cw]={};
        getWeekQuestions(cw).forEach((_,i) => { state.answers[cw][i]=existing[i]; });
      } else { state.answers[cw]={}; }
      render(); return;
    }

    const qs = getWeekQuestions(cw);
    const existingLocal = getLocalSubmission(state.confirmedEmail, cw);
    if (existingLocal) {
      const note=document.createElement('div'); note.className='resubmit-note';
      note.textContent=`You have already submitted answers for week ${cw}. You can update and resubmit until Sunday.`;
      container.appendChild(note);
    }

    const answered=Object.keys(state.answers[cw]).length;
    const pct=Math.round(answered/qs.length*100);
    const progressDiv=document.createElement('div');
    progressDiv.innerHTML=`<div style="font-size:13px;color:var(--text2);margin-bottom:6px;">${answered} of ${qs.length} answered &mdash; Week ${cw}</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
    container.appendChild(progressDiv);

    qs.forEach((q,i) => {
      const card=document.createElement('div'); card.className='card';
      card.innerHTML=`<span class="week-badge">Week ${cw}</span><span class="cat-badge">${q.cat}</span><p class="question-text">${i+1}. ${q.q}</p>`;
      const optDiv=document.createElement('div'); optDiv.className='options';
      q.options.forEach((opt,oi) => {
        const btn=document.createElement('button');
        btn.className='option'+(state.answers[cw][i]===oi?' selected':'');
        btn.innerHTML=`<span class="option-letter">${String.fromCharCode(65+oi)}</span>${opt}`;
        btn.onclick=()=>{ state.answers[cw][i]=oi; render(); };
        optDiv.appendChild(btn);
      });
      card.appendChild(optDiv); container.appendChild(card);
    });

    const allAnswered=Object.keys(state.answers[cw]).length===qs.length;
    const submitBtn=document.createElement('button'); submitBtn.className='submit-btn';
    submitBtn.textContent=allAnswered?(existingLocal?'Resubmit Week '+cw+' Answers':'Submit Week '+cw+' Answers'):`Answer all ${qs.length} questions to submit`;
    submitBtn.disabled=!allAnswered||state.loading;
    submitBtn.onclick=async()=>{
      if(!allAnswered||state.loading) return;
      state.loading=true; render();
      const answerArr=qs.map((_,i)=>state.answers[cw][i]);
      await saveSubmission(state.confirmedEmail, cw, answerArr);
      state.loading=false;
      state.leaderboard=null;
      const correct=qs.filter((q,i)=>answerArr[i]===q.correct).length;
      state.successMsg=existingLocal?`Resubmitted! You answered ${correct} of ${qs.length} correctly this time.`:`Submitted! You answered ${correct} of ${qs.length} correctly. Results are shown after this week closes.`;
      render();
    };
    container.appendChild(submitBtn);
  });
}

/* ── Results page ── */
function renderResults(container) {
  renderIdentityBox(container, async () => {
    const cw=state.currentWeek; const email=state.confirmedEmail;
    let totalQ=0, totalCorrect=0, allResults=[];
    const loadMsg=document.createElement('div'); loadMsg.className='info-msg';
    loadMsg.innerHTML='<span class="spinner"></span>Loading your results...';
    container.appendChild(loadMsg);

    for(let w=1;w<cw;w++){
      const sub=await getSubmission(email,w); if(!sub) continue;
      const qs=getWeekQuestions(w);
      qs.forEach((q,i)=>{
        const given=sub[i], isCorrect=given===q.correct;
        if(isCorrect) totalCorrect++; totalQ++;
        allResults.push({w,cat:q.cat,q:q.q,given,correct:q.correct,isCorrect,options:q.options,explanation:q.explanation});
      });
    }
    container.removeChild(loadMsg);

    const summDiv=document.createElement('div'); summDiv.className='summary-grid';
    const weeksPlayed=new Set(allResults.map(r=>r.w)).size;
    summDiv.innerHTML=`
      <div class="metric"><div class="metric-val">${weeksPlayed}</div><div class="metric-label">Weeks played</div></div>
      <div class="metric"><div class="metric-val">${totalQ}</div><div class="metric-label">Questions answered</div></div>
      <div class="metric"><div class="metric-val">${totalCorrect}</div><div class="metric-label">Correct</div></div>
      <div class="metric"><div class="metric-val">${totalQ>0?Math.round(totalCorrect/totalQ*100):0}%</div><div class="metric-label">Score</div></div>
    `;
    container.appendChild(summDiv);

    if(cw<=1){
      const msg=document.createElement('div'); msg.className='info-msg';
      msg.textContent='Results for past weeks appear here after each week closes. Week 1 closes March 29, 2026.';
      container.appendChild(msg); return;
    }
    if(allResults.length===0){
      const msg=document.createElement('div'); msg.className='info-msg';
      msg.textContent='No completed weeks found. Participate in quiz weeks to see your results here.';
      container.appendChild(msg); return;
    }

    const filterRow=document.createElement('div'); filterRow.className='filter-row';
    const weekSel=document.createElement('select');
    weekSel.innerHTML='<option value="0">All weeks</option>';
    for(let w=1;w<cw;w++) weekSel.innerHTML+=`<option value="${w}"${state.filterWeek==w?' selected':''}>Week ${w}</option>`;
    weekSel.value=state.filterWeek; weekSel.onchange=e=>{state.filterWeek=parseInt(e.target.value);render();};
    const catSel=document.createElement('select');
    catSel.innerHTML='<option value="">All categories</option>';
    CATEGORIES.forEach(c=>catSel.innerHTML+=`<option value="${c}"${state.filterCat===c?' selected':''}>${c}</option>`);
    catSel.value=state.filterCat; catSel.onchange=e=>{state.filterCat=e.target.value;render();};
    const sortSel=document.createElement('select');
    sortSel.innerHTML='<option value="week">Sort by week</option><option value="cat">Sort by category</option><option value="status">Wrong answers first</option>';
    sortSel.value=state.sortField; sortSel.onchange=e=>{state.sortField=e.target.value;render();};
    filterRow.appendChild(weekSel); filterRow.appendChild(catSel); filterRow.appendChild(sortSel);
    container.appendChild(filterRow);

    let filtered=allResults.filter(r=>(state.filterWeek===0||r.w===state.filterWeek)&&(!state.filterCat||r.cat===state.filterCat));
    if(state.sortField==='week') filtered.sort((a,b)=>a.w-b.w);
    else if(state.sortField==='cat') filtered.sort((a,b)=>a.cat.localeCompare(b.cat));
    else filtered.sort((a,b)=>(a.isCorrect?1:0)-(b.isCorrect?1:0));

    const card=document.createElement('div'); card.className='card';
    filtered.forEach(r=>{
      const row=document.createElement('div'); row.className='result-row';
      const gt=r.given!==undefined?`${String.fromCharCode(65+r.given)}: ${r.options[r.given]}`:'Not answered';
      const ct=`${String.fromCharCode(65+r.correct)}: ${r.options[r.correct]}`;
      row.innerHTML=`<div class="result-q"><span class="status-dot ${r.isCorrect?'dot-green':'dot-red'}"></span>${r.q}</div><div class="result-meta">Week ${r.w} &nbsp;&middot;&nbsp; ${r.cat}</div><div style="font-size:13px;line-height:1.6"><span class="${r.isCorrect?'result-correct':'result-wrong'}">Your answer: ${gt}</span>${!r.isCorrect?`<br><span class="result-correct">Correct: ${ct}</span>`:''}</div><div class="explanation-box">${r.explanation}</div>`;
      card.appendChild(row);
    });
    if(filtered.length===0) card.innerHTML='<div class="info-msg" style="margin:0">No results match the current filter.</div>';
    container.appendChild(card);
  });
}

/* ── Leaderboard page ── */
function renderLeaderboard(container) {
  const title=document.createElement('div');
  title.innerHTML='<h2 style="font-size:18px;font-weight:700;margin-bottom:1rem;color:var(--text)">Live Leaderboard</h2>';
  container.appendChild(title);

  if(!state.leaderboard){
    const loadMsg=document.createElement('div'); loadMsg.className='info-msg';
    loadMsg.innerHTML='<span class="spinner"></span>Loading leaderboard...';
    container.appendChild(loadMsg);
    getLeaderboard().then(rows=>{
      state.leaderboard=rows; render();
    });
    return;
  }

  const refreshBtn=document.createElement('button');
  refreshBtn.className='nav-btn'; refreshBtn.style='margin-bottom:1rem';
  refreshBtn.textContent='Refresh';
  refreshBtn.onclick=()=>{ state.leaderboard=null; render(); };
  container.appendChild(refreshBtn);

  if(!state.leaderboard||state.leaderboard.length===0){
    const msg=document.createElement('div'); msg.className='info-msg';
    msg.textContent='No submissions yet. Be the first to participate!';
    container.appendChild(msg); return;
  }

  const maxCorrect=state.leaderboard[0]?.correct||1;
  const wrapper=document.createElement('div'); wrapper.style.overflowX='auto';
  const table=document.createElement('table'); table.className='leaderboard';
  table.innerHTML='<thead><tr><th>#</th><th>Participant</th><th>Weeks</th><th>Correct</th><th>Score</th><th style="min-width:120px">Progress</th></tr></thead>';
  const tbody=document.createElement('tbody');

  state.leaderboard.forEach((row,idx)=>{
    const tr=document.createElement('tr');
    const isMe=row.email===state.confirmedEmail;
    if(isMe) tr.className='me';
    const pct=row.total>0?Math.round(row.correct/row.total*100):0;
    const medal=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':`${idx+1}`;
    const shortEmail=row.email.length>28?row.email.slice(0,25)+'...':row.email;
    tr.innerHTML=`
      <td><span class="rank-medal">${medal}</span></td>
      <td style="font-size:13px">${shortEmail}${isMe?' <span style="color:var(--orange);font-size:11px;font-weight:700">(you)</span>':''}</td>
      <td style="text-align:center">${row.weeks.length}</td>
      <td style="text-align:center;font-weight:700">${row.correct}/${row.total}</td>
      <td style="text-align:center;font-weight:700;color:var(--orange)">${pct}%</td>
      <td><div class="score-bar-wrap"><div class="score-bar-fill" style="width:${Math.round(row.correct/maxCorrect*100)}%"></div></div></td>
    `;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody); wrapper.appendChild(table); container.appendChild(wrapper);

  if(!isConfigured()){
    const note=document.createElement('div'); note.className='info-msg'; note.style.marginTop='1rem';
    note.textContent='Note: This leaderboard only shows data from this browser. Configure Supabase to see all participants.';
    container.appendChild(note);
  }
}

/* ── Admin page ── */
function renderAdmin(container){
  if(!state.isAdmin){ container.innerHTML='<div class="info-msg">Admin access requires ?admin=true in the URL.</div>'; return; }
  maybeShowConfigNotice(container);

  const tabRow=document.createElement('div'); tabRow.className='tab-row';
  [['questions','All Questions & Answers'],['submissions','All Submissions'],['leaderboard-admin','Leaderboard']].forEach(([id,label])=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(state.adminTab===id?' active':'');
    btn.textContent=label; btn.onclick=()=>{ state.adminTab=id; render(); };
    tabRow.appendChild(btn);
  });
  container.appendChild(tabRow);

  if(state.adminTab==='questions'){
    const filterRow=document.createElement('div'); filterRow.className='filter-row';
    const weekSel=document.createElement('select');
    weekSel.innerHTML='<option value="0">All weeks</option>';
    for(let w=1;w<=QUIZ_WEEKS;w++) weekSel.innerHTML+=`<option value="${w}"${state.filterWeek==w?' selected':''}>Week ${w}</option>`;
    weekSel.value=state.filterWeek; weekSel.onchange=e=>{state.filterWeek=parseInt(e.target.value);render();};
    const catSel=document.createElement('select');
    catSel.innerHTML='<option value="">All categories</option>';
    CATEGORIES.forEach(c=>catSel.innerHTML+=`<option value="${c}"${state.filterCat===c?' selected':''}>${c}</option>`);
    catSel.value=state.filterCat; catSel.onchange=e=>{state.filterCat=e.target.value;render();};
    filterRow.appendChild(weekSel); filterRow.appendChild(catSel); container.appendChild(filterRow);

    const qs=QUESTIONS.filter(q=>(state.filterWeek===0||q.week===state.filterWeek)&&(!state.filterCat||q.cat===state.filterCat));
    const wrapper=document.createElement('div'); wrapper.style.overflowX='auto';
    const table=document.createElement('table'); table.className='admin-table';
    table.innerHTML='<thead><tr><th>Wk</th><th>Category</th><th>Question</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>Correct answer</th><th>Explanation</th></tr></thead>';
    const tbody=document.createElement('tbody');
    qs.forEach(q=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${q.week}</td><td style="white-space:nowrap">${q.cat}</td><td style="min-width:180px;max-width:220px">${q.q}</td>${q.options.map(o=>`<td style="min-width:100px;max-width:140px;font-size:11px">${o}</td>`).join('')}<td><span class="correct-tag">${String.fromCharCode(65+q.correct)}: ${q.options[q.correct]}</span></td><td style="min-width:180px;font-size:11px;color:var(--text2)">${q.explanation}</td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody); wrapper.appendChild(table); container.appendChild(wrapper);

  } else if(state.adminTab==='submissions'){
    if(!state.adminRows){
      const loadMsg=document.createElement('div'); loadMsg.className='info-msg';
      loadMsg.innerHTML='<span class="spinner"></span>Loading submissions...';
      container.appendChild(loadMsg);
      getAllSubmissionsAdmin().then(rows=>{ state.adminRows=rows; render(); });
      return;
    }
    const refreshBtn=document.createElement('button'); refreshBtn.className='nav-btn'; refreshBtn.style='margin-bottom:1rem';
    refreshBtn.textContent='Refresh'; refreshBtn.onclick=()=>{ state.adminRows=null; render(); };
    container.appendChild(refreshBtn);

    if(!state.adminRows||state.adminRows.length===0){ container.innerHTML+='<div class="info-msg">No submissions yet.</div>'; return; }
    const wrapper=document.createElement('div'); wrapper.style.overflowX='auto';
    const table=document.createElement('table'); table.className='admin-table';
    table.innerHTML='<thead><tr><th>Email</th><th>Week</th><th>Score</th><th>Answers (green=correct)</th><th>Submitted</th></tr></thead>';
    const tbody=document.createElement('tbody');
    state.adminRows.forEach(r=>{
      const qs=getWeekQuestions(r.week);
      const correct=qs.filter((q,i)=>r.answers[i]===q.correct).length;
      const ansHtml=qs.map((q,i)=>`<span style="color:${r.answers[i]===q.correct?'var(--green)':'var(--red)'};font-weight:700;margin-right:4px">${String.fromCharCode(65+r.answers[i])}</span>`).join('');
      const when=r.submitted_at?new Date(r.submitted_at).toLocaleString('nl-NL',{dateStyle:'short',timeStyle:'short'}):'—';
      const tr=document.createElement('tr');
      tr.innerHTML=`<td style="font-size:12px">${r.email}</td><td>Week ${r.week}</td><td style="font-weight:700">${correct}/${qs.length}</td><td>${ansHtml}</td><td style="font-size:11px;color:var(--text2);white-space:nowrap">${when}</td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody); wrapper.appendChild(table); container.appendChild(wrapper);

  } else {
    state.leaderboard=null;
    renderLeaderboard(container);
  }
}

render();
</script>
