<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostNL Mendix Daily Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6200; --orange-light: #FFF0E6; --orange-mid: #FFD5B3;
      --blue: #003087; --blue-light: #E6EBF5;
      --bg: #f0f2f5; --bg2: #ffffff; --bg3: #f0f2f5;
      --text: #1a1a1a; --text2: #555555; --text3: #999999;
      --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.18);
      --green: #2d6a0f; --green-bg: #e8f5d9;
      --red: #a32020; --red-bg: #fde8e8;
      --amber: #7a4800; --amber-bg: #fff3d9;
      --gold: #c8960c; --silver: #6b7280; --bronze: #92400e;
      --radius: 8px; --radius-lg: 14px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111113; --bg2: #1e1e21; --bg3: #2a2a2e;
        --text: #f4f4f5; --text2: #a1a1aa; --text3: #52525b;
        --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.15);
        --blue-light: #0d1a38; --orange-light: #2a1200;
        --green-bg: #0f2204; --red-bg: #250707; --amber-bg: #221100;
        --shadow: 0 1px 4px rgba(0,0,0,0.4);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--blue); color: #fff;
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 54px; position: sticky; top: 0; z-index: 100;
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-logo { font-size: 17px; font-weight: 700; color: var(--orange); letter-spacing: -0.3px; }
    .header-sep { color: rgba(255,255,255,0.25); }
    .header-title { font-size: 13px; color: rgba(255,255,255,0.75); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-date { font-size: 12px; color: rgba(255,255,255,0.5); font-variant-numeric: tabular-nums; }
    .header-user { font-size: 12px; color: rgba(255,255,255,0.6); }
    .link-btn {
      background: none; border: none; cursor: pointer;
      color: var(--orange); font-size: 12px; padding: 0;
      text-decoration: underline; text-underline-offset: 2px;
    }

    /* ── Layout ── */
    .layout {
      max-width: 1100px; margin: 0 auto;
      padding: 1.75rem 1.25rem 4rem;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 760px) {
      .layout { grid-template-columns: 1fr; }
      .leaderboard-col { order: -1; }
    }

    /* ── Card ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    /* ── Email gate ── */
    .email-wrap { max-width: 520px; margin: 3rem auto; padding: 0 1.25rem; }
    .email-wrap h1 { font-size: 22px; font-weight: 600; margin-bottom: .4rem; }
    .email-wrap p { color: var(--text2); font-size: 14px; line-height: 1.6; margin-bottom: 1.5rem; }
    .input-row { display: flex; gap: 10px; }
    .email-input {
      flex: 1; height: 42px; border: 1px solid var(--border2);
      border-radius: var(--radius); background: var(--bg2); color: var(--text);
      padding: 0 12px; font-size: 15px; outline: none;
    }
    .email-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,98,0,.15); }

    /* ── Buttons ── */
    .btn {
      height: 42px; padding: 0 20px; border-radius: var(--radius);
      font-size: 14px; font-weight: 600; cursor: pointer;
      border: none; transition: opacity .15s, transform .1s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--orange); color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }
    .btn-secondary:hover { background: var(--border); }
    .btn:disabled { opacity: .4; cursor: default; transform: none; }

    /* ── Spinner ── */
    .spinner {
      width: 32px; height: 32px; margin: 2.5rem auto; display: block;
      border: 3px solid var(--border2); border-top-color: var(--orange);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Question panel ── */
    .q-inner { padding: 1.75rem; }
    .q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 1.1rem; flex-wrap: wrap; }
    .badge {
      font-size: 11px; font-weight: 600; padding: 3px 9px;
      border-radius: 20px; letter-spacing: .03em;
    }
    .badge-cat { background: var(--blue-light); color: var(--blue); }
    .badge-diff-easy   { background: var(--green-bg); color: var(--green); }
    .badge-diff-medium { background: var(--amber-bg); color: var(--amber); }
    .badge-diff-hard   { background: var(--red-bg);   color: var(--red);   }
    .q-text { font-size: 16px; font-weight: 500; line-height: 1.6; margin-bottom: 1.4rem; }

    /* ── Options ── */
    .options { display: flex; flex-direction: column; gap: 9px; }
    .option {
      display: flex; align-items: flex-start; gap: 11px;
      padding: 12px 14px; border-radius: var(--radius);
      border: 1.5px solid var(--border2); background: var(--bg2);
      cursor: pointer; text-align: left; width: 100%;
      transition: border-color .13s, background .13s;
    }
    .option:hover:not(:disabled) { border-color: var(--orange); background: var(--orange-light); }
    .option:disabled { cursor: default; }
    .option-letter {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--bg3); color: var(--text2);
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .option-text { font-size: 13.5px; line-height: 1.5; color: var(--text); }
    .option.selected  { border-color: var(--orange); background: var(--orange-light); }
    .option.selected .option-letter { background: var(--orange); color: #fff; }
    .option.correct   { border-color: var(--green); background: var(--green-bg); }
    .option.correct .option-letter { background: var(--green); color: #fff; }
    .option.wrong     { border-color: var(--red); background: var(--red-bg); }
    .option.wrong .option-letter   { background: var(--red); color: #fff; }

    /* ── Submit / result ── */
    .submit-row { margin-top: 1.1rem; }
    .result-banner {
      border-radius: var(--radius); padding: 13px 15px;
      display: flex; align-items: flex-start; gap: 10px; margin-top: 1.1rem;
    }
    .result-banner.correct { background: var(--green-bg); border: 1px solid var(--green); }
    .result-banner.wrong   { background: var(--red-bg);   border: 1px solid var(--red);   }
    .result-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .result-label { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .result-label.correct { color: var(--green); }
    .result-label.wrong   { color: var(--red); }
    .result-explanation { font-size: 12.5px; color: var(--text2); line-height: 1.6; }

    /* ── Feedback ── */
    .feedback-section { margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
    .feedback-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .6rem; }
    .stars { display: flex; gap: 4px; margin-bottom: .85rem; }
    .star { font-size: 22px; cursor: pointer; color: var(--border2); background: none; border: none; padding: 0; line-height: 1; transition: color .1s, transform .1s; }
    .star:hover, .star.active { color: #f5a623; }
    .star:hover { transform: scale(1.15); }
    .feedback-comment {
      width: 100%; min-height: 64px; resize: vertical;
      border: 1px solid var(--border2); border-radius: var(--radius);
      background: var(--bg2); color: var(--text);
      padding: 9px 11px; font-size: 13px; font-family: inherit; outline: none; margin-bottom: .7rem;
    }
    .feedback-comment:focus { border-color: var(--orange); }
    .feedback-sent  { font-size: 13px; color: var(--green); font-weight: 500; }
    .feedback-error { font-size: 12px; color: var(--red); margin-top: .4rem; }

    /* ── Already-answered ── */
    .already-banner {
      background: var(--blue-light); border: 1px solid rgba(0,48,135,.18);
      border-radius: var(--radius); padding: 9px 13px;
      font-size: 12.5px; color: var(--blue); margin-bottom: .9rem;
    }

    /* ── Status screens ── */
    .status-msg { text-align: center; padding: 2.5rem 1rem; color: var(--text2); font-size: 14px; }
    .status-msg strong { display: block; font-size: 32px; margin-bottom: .4rem; }
    .error-box { background: var(--red-bg); border: 1px solid var(--red); border-radius: var(--radius); padding: 11px 14px; font-size: 13px; color: var(--red); }

    /* ── Leaderboard panel ── */
    .lb-header {
      padding: 1.1rem 1.25rem .85rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .lb-title { font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .lb-subtitle { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .lb-refresh {
      font-size: 11px; color: var(--orange); background: none; border: none;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
      border: 1px solid var(--orange); font-weight: 600;
    }
    .lb-refresh:hover { background: var(--orange-light); }

    .lb-list { padding: .5rem 0; }
    .lb-row {
      display: grid;
      grid-template-columns: 28px 1fr 36px;
      align-items: center; gap: 8px;
      padding: .6rem 1.25rem;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: var(--bg3); }
    .lb-row.me { background: var(--orange-light); }
    .lb-row.me:hover { background: var(--orange-mid); }

    .lb-rank { font-size: 13px; font-weight: 700; text-align: center; color: var(--text3); }
    .lb-rank.gold   { color: var(--gold); }
    .lb-rank.silver { color: var(--silver); }
    .lb-rank.bronze { color: var(--bronze); }

    .lb-info { min-width: 0; }
    .lb-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-meta { font-size: 11px; color: var(--text3); margin-top: 1px; display: flex; align-items: center; gap: 6px; }
    .lb-streak { color: var(--orange); font-weight: 600; }

    .lb-score { text-align: right; }
    .lb-correct { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1; }
    .lb-pct { font-size: 10px; color: var(--text3); margin-top: 1px; }

    .lb-loading { padding: 2rem; text-align: center; }
    .lb-empty { padding: 2rem 1.25rem; text-align: center; color: var(--text3); font-size: 13px; }

    .lb-updated { padding: .6rem 1.25rem; font-size: 10px; color: var(--text3); text-align: right; border-top: 1px solid var(--border); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <span class="header-logo">PostNL</span>
    <span class="header-sep">|</span>
    <span class="header-title">Mendix Daily Quiz</span>
  </div>
  <div class="header-right">
    <span class="header-date" id="header-date"></span>
    <span class="header-user" id="header-user"></span>
  </div>
</div>

<div id="root"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const API = 'https://r4800dlclj.execute-api.eu-west-1.amazonaws.com/prod';

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
const Q = {
  email: localStorage.getItem('quiz_email') || '',
  loading: false,
  error: null,
  question: null,
  done: false,
  doneMessage: '',
  selectedIndex: null,
  submitted: false,
  correct: null,
  correctIndex: null,
  explanation: null,
  alreadyAnswered: false,
  feedbackRating: 0,
  feedbackComment: '',
  feedbackSent: false,
  feedbackError: null,
  feedbackSending: false,
};

const LB = {
  loading: false,
  board: [],
  updatedAt: null,
  error: null,
};

// ─────────────────────────────────────────────────────────────────────────────
// ROOT RENDER
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');

  // Update header user
  const hu = document.getElementById('header-user');
  if (Q.email && hu) {
    hu.innerHTML = `${esc(Q.email)} &nbsp;<button class="link-btn" onclick="changeUser()">change</button>`;
  }

  if (!Q.email) {
    root.innerHTML = renderEmailGate();
    document.getElementById('email-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitEmail(); });
    document.getElementById('btn-start').addEventListener('click', submitEmail);
    return;
  }

  root.innerHTML = `
    <div class="layout">
      <div class="question-col">${renderQuestion()}</div>
      <div class="leaderboard-col">${renderLeaderboard()}</div>
    </div>`;

  // Attach events
  if (Q.submitted) {
    const ta = document.getElementById('feedback-comment');
    if (ta) ta.addEventListener('input', e => { Q.feedbackComment = e.target.value; });
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// EMAIL GATE
// ─────────────────────────────────────────────────────────────────────────────
function renderEmailGate() {
  return `
    <div class="email-wrap">
      <h1>Mendix question of the day</h1>
      <p>One new Mendix question every day. You'll get a random question you haven't seen before - answer it, see the explanation, and leave feedback.</p>
      <div class="card" style="padding:1.5rem">
        <div style="margin-bottom:.75rem;font-size:14px;font-weight:500">Enter your PostNL email to start</div>
        <div class="input-row">
          <input type="email" id="email-input" class="email-input" placeholder="you@postnl.nl" value="${esc(Q.email)}">
          <button id="btn-start" class="btn btn-primary">Start &rarr;</button>
        </div>
        ${Q.error ? `<div class="error-box" style="margin-top:.75rem">${esc(Q.error)}</div>` : ''}
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// QUESTION PANEL
// ─────────────────────────────────────────────────────────────────────────────
function renderQuestion() {
  if (Q.loading) return `<div class="card"><div class="spinner"></div></div>`;

  if (Q.error) return `
    <div class="card"><div class="q-inner">
      <div class="error-box">${esc(Q.error)}</div>
      <div style="margin-top:1rem;display:flex;gap:8px">
        <button class="btn btn-primary" onclick="loadQuestion()">Retry</button>
        <button class="btn btn-secondary" onclick="changeUser()">Change user</button>
      </div>
    </div></div>`;

  if (Q.done) return `
    <div class="card"><div class="q-inner">
      <div class="status-msg">
        <strong>🎓</strong>
        ${esc(Q.doneMessage || 'All questions completed - well done!')}
        <p style="margin-top:.75rem;font-size:13px;color:var(--text3)">Check back later for new questions.</p>
      </div>
    </div></div>`;

  if (!Q.question) return `<div class="card"><div class="spinner"></div></div>`;

  const q = Q.question;
  const diffClass = `badge-diff-${q.difficulty || 'medium'}`;

  return `
    <div class="card">
      <div class="q-inner">
        ${Q.alreadyAnswered ? `<div class="already-banner">You already answered today's question.</div>` : ''}
        <div class="q-meta">
          <span class="badge badge-cat">${esc(q.category)}</span>
          <span class="badge ${diffClass}">${esc(q.difficulty || 'medium')}</span>
        </div>
        <p class="q-text">${esc(q.text)}</p>
        <div class="options">
          ${q.options.map((opt, i) => {
            let cls = 'option';
            if (Q.submitted) {
              if (i === Q.correctIndex) cls += ' correct';
              else if (i === Q.selectedIndex && i !== Q.correctIndex) cls += ' wrong';
            } else if (i === Q.selectedIndex) cls += ' selected';
            return `<button class="${cls}" data-i="${i}" ${Q.submitted ? 'disabled' : ''} onclick="selectOption(${i})">
              <span class="option-letter">${'ABCDE'[i]}</span>
              <span class="option-text">${esc(opt)}</span>
            </button>`;
          }).join('')}
        </div>
        ${!Q.submitted
          ? `<div class="submit-row" style="margin-top:1.1rem">
               <button class="btn btn-primary" onclick="submitAnswer()" id="btn-submit" style="height:42px;padding:0 22px" ${Q.selectedIndex === null ? 'disabled' : ''}>
                 Submit answer
               </button>
             </div>`
          : `<div class="result-banner ${Q.correct ? 'correct' : 'wrong'}">
               <span class="result-icon">${Q.correct ? '✓' : '✗'}</span>
               <div>
                 <div class="result-label ${Q.correct ? 'correct' : 'wrong'}">
                   ${Q.correct ? 'Correct!' : 'Not quite - the correct answer is ' + 'ABCDE'[Q.correctIndex]}
                 </div>
                 <div class="result-explanation">${esc(Q.explanation || '')}</div>
               </div>
             </div>
             ${renderFeedback()}`
        }
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// FEEDBACK
// ─────────────────────────────────────────────────────────────────────────────
function renderFeedback() {
  if (Q.feedbackSent) return `
    <div class="feedback-section"><span class="feedback-sent">&#10003; Feedback sent - thank you!</span></div>`;

  return `
    <div class="feedback-section">
      <div class="feedback-title">Rate this question</div>
      <div class="stars">
        ${[1,2,3,4,5].map(n =>
          `<button class="star ${n <= Q.feedbackRating ? 'active' : ''}" onclick="setRating(${n})">&#9733;</button>`
        ).join('')}
      </div>
      <textarea class="feedback-comment" id="feedback-comment" placeholder="Optional: was anything unclear or incorrect?" maxlength="500">${esc(Q.feedbackComment)}</textarea>
      <button class="btn btn-secondary" onclick="submitFeedback()" style="height:36px;font-size:13px"
        ${Q.feedbackRating === 0 || Q.feedbackSending ? 'disabled' : ''}>
        ${Q.feedbackSending ? 'Sending...' : 'Send feedback'}
      </button>
      ${Q.feedbackError ? `<div class="feedback-error">${esc(Q.feedbackError)}</div>` : ''}
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// LEADERBOARD PANEL
// ─────────────────────────────────────────────────────────────────────────────
function renderLeaderboard() {
  const rankLabel = (rank) => {
    if (rank === 1) return `<span class="lb-rank gold">🥇</span>`;
    if (rank === 2) return `<span class="lb-rank silver">🥈</span>`;
    if (rank === 3) return `<span class="lb-rank bronze">🥉</span>`;
    return `<span class="lb-rank">${rank}</span>`;
  };

  let body;
  if (LB.loading) {
    body = `<div class="lb-loading"><div class="spinner" style="margin:1rem auto;width:24px;height:24px;border-width:2px"></div></div>`;
  } else if (LB.error) {
    body = `<div class="lb-empty">${esc(LB.error)}</div>`;
  } else if (LB.board.length === 0) {
    body = `<div class="lb-empty">No answers yet - be the first!</div>`;
  } else {
    body = `<div class="lb-list">
      ${LB.board.map(p => {
        const isMe = p.email === Q.email;
        return `<div class="lb-row ${isMe ? 'me' : ''}">
          ${rankLabel(p.rank)}
          <div class="lb-info">
            <div class="lb-name">${esc(p.name)}${isMe ? ' <span style="font-size:10px;color:var(--orange)">(you)</span>' : ''}</div>
            <div class="lb-meta">
              <span>${p.total} answered</span>
              ${p.streak > 1 ? `<span class="lb-streak">&#128293; ${p.streak} day streak</span>` : ''}
            </div>
          </div>
          <div class="lb-score">
            <div class="lb-correct">${p.correct}</div>
            <div class="lb-pct">${p.pct}%</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    ${LB.updatedAt ? `<div class="lb-updated">Updated ${formatTime(LB.updatedAt)}</div>` : ''}`;
  }

  return `
    <div class="card" style="position:sticky;top:70px">
      <div class="lb-header">
        <div>
          <div class="lb-title">&#127942; Leaderboard</div>
          <div class="lb-subtitle">Correct answers this season</div>
        </div>
        <button class="lb-refresh" onclick="loadLeaderboard()">Refresh</button>
      </div>
      ${body}
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────────────────────────────────────
function submitEmail() {
  const input = document.getElementById('email-input');
  const email = (input ? input.value : Q.email).trim();
  if (!email || !email.includes('@')) { Q.error = 'Please enter a valid email address.'; render(); return; }
  Q.email = email;
  Q.error = null;
  localStorage.setItem('quiz_email', email);
  loadQuestion();
  loadLeaderboard();
}

async function loadQuestion() {
  Q.loading = true; Q.error = null; Q.question = null;
  Q.selectedIndex = null; Q.submitted = false;
  Q.correct = null; Q.correctIndex = null; Q.explanation = null;
  Q.alreadyAnswered = false; Q.done = false;
  Q.feedbackRating = 0; Q.feedbackComment = ''; Q.feedbackSent = false; Q.feedbackError = null;
  render();

  try {
    const res = await fetch(`${API}/question?email=${encodeURIComponent(Q.email)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    if (data.done) {
      Q.done = true; Q.doneMessage = data.message;
    } else {
      Q.question = data.question;
      Q.alreadyAnswered = data.alreadyAnswered || false;
      if (data.alreadyAnswered) {
        Q.submitted = true;
        Q.selectedIndex = data.selectedIndex;
        Q.correct = data.correct;
        Q.correctIndex = data.correctIndex;
        Q.explanation = data.explanation;
      }
    }
  } catch (err) {
    Q.error = err.message;
  }
  Q.loading = false;
  render();
}

async function loadLeaderboard() {
  LB.loading = true; LB.error = null;
  render();
  try {
    const res = await fetch(`${API}/leaderboard`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    LB.board = data.board;
    LB.updatedAt = data.updatedAt;
  } catch (err) {
    LB.error = 'Could not load leaderboard.';
  }
  LB.loading = false;
  render();
}

function selectOption(i) {
  if (Q.submitted) return;
  Q.selectedIndex = i;
  render();
}

async function submitAnswer() {
  if (Q.selectedIndex === null || Q.submitted) return;
  const btn = document.getElementById('btn-submit');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting...'; }
  try {
    const res = await fetch(`${API}/answer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: Q.email, questionId: Q.question.questionId, answerIndex: Q.selectedIndex })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    Q.submitted = true;
    Q.correct = data.correct;
    Q.correctIndex = data.correctIndex;
    Q.explanation = data.explanation;
    // Refresh leaderboard after answering
    loadLeaderboard();
  } catch (err) {
    Q.error = err.message;
  }
  render();
}

function setRating(n) {
  Q.feedbackRating = n;
  const comment = document.getElementById('feedback-comment');
  if (comment) Q.feedbackComment = comment.value;
  render();
  const ta = document.getElementById('feedback-comment');
  if (ta) { ta.value = Q.feedbackComment; ta.addEventListener('input', e => { Q.feedbackComment = e.target.value; }); }
}

async function submitFeedback() {
  if (Q.feedbackRating === 0 || Q.feedbackSending) return;
  const ta = document.getElementById('feedback-comment');
  if (ta) Q.feedbackComment = ta.value;
  Q.feedbackSending = true; Q.feedbackError = null;
  render();
  try {
    const res = await fetch(`${API}/feedback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: Q.email, questionId: Q.question.questionId, rating: Q.feedbackRating, comment: Q.feedbackComment })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    Q.feedbackSent = true;
  } catch (err) {
    Q.feedbackError = 'Could not send: ' + err.message;
  }
  Q.feedbackSending = false;
  render();
}

function changeUser() {
  Q.email = ''; Q.question = null; Q.error = null;
  Q.done = false; Q.submitted = false;
  LB.board = []; LB.updatedAt = null;
  localStorage.removeItem('quiz_email');
  document.getElementById('header-user').innerHTML = '';
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('nl-NL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

if (Q.email) {
  loadQuestion();
  loadLeaderboard();
} else {
  render();
}

// Auto-refresh leaderboard every 5 minutes
setInterval(loadLeaderboard, 5 * 60 * 1000);
</script>
</body>
</html>
