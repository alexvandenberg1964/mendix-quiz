<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostNL Mendix Engineer Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6200; --orange-light: #FFF0E6;
      --blue: #003087; --blue-light: #E6EBF5;
      --bg: #ffffff; --bg2: #f5f5f5; --bg3: #ececec;
      --text: #1a1a1a; --text2: #666666;
      --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.20);
      --green: #3B6D11; --green-bg: #EAF3DE;
      --red: #A32D2D; --red-bg: #FCEBEB;
      --amber: #854F0B; --amber-bg: #FAEEDA;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#1e1e1e; --bg2:#2a2a2a; --bg3:#333;
        --text:#f0f0f0; --text2:#aaaaaa;
        --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.20);
        --blue-light:#0d1f3c; --orange-light:#3a1f0a;
        --green-bg:#1a2e0a; --red-bg:#2e1010; --amber-bg:#2e1e08;
      }
    }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    #app { max-width:900px; margin:0 auto; padding-bottom:3rem; }
    .header { background:var(--blue); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
    .header-logo { font-size:22px; font-weight:700; color:var(--orange); }
    .header-sub { font-size:12px; color:rgba(255,255,255,0.7); margin-top:2px; }
    .header-week { background:var(--orange); color:white; font-size:12px; font-weight:600; padding:4px 12px; border-radius:var(--radius); }
    .nav { display:flex; gap:8px; padding:0 1.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .nav-btn { padding:8px 18px; border-radius:var(--radius); border:1px solid var(--border2); background:var(--bg); color:var(--text); cursor:pointer; font-size:13px; font-weight:500; transition:all 0.15s; }
    .nav-btn.active { background:var(--orange); border-color:var(--orange); color:white; }
    .nav-btn:hover:not(.active) { background:var(--bg2); }
    .container { padding:0 1.5rem; }
    .card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; margin-bottom:1rem; }
    .week-badge { display:inline-block; background:var(--orange); color:white; font-size:11px; font-weight:600; padding:3px 10px; border-radius:var(--radius); margin-bottom:.75rem; }
    .cat-badge { display:inline-block; background:var(--blue-light); color:var(--blue); font-size:11px; font-weight:600; padding:3px 10px; border-radius:var(--radius); margin-bottom:.75rem; margin-left:6px; }
    .question-text { font-size:15px; font-weight:600; margin-bottom:1rem; line-height:1.5; }
    .options { display:flex; flex-direction:column; gap:8px; }
    .option { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; border-radius:var(--radius); border:1px solid var(--border); cursor:pointer; transition:all 0.15s; font-size:14px; color:var(--text); background:var(--bg); text-align:left; width:100%; line-height:1.4; }
    .option:hover { background:var(--bg2); border-color:var(--border2); }
    .option.selected { border-color:var(--orange); background:var(--orange-light); }
    .option.correct { border-color:var(--green); background:var(--green-bg); color:var(--green); }
    .option.wrong { border-color:var(--red); background:var(--red-bg); color:var(--red); }
    .option-letter { font-weight:700; min-width:20px; color:var(--orange); font-size:13px; flex-shrink:0; margin-top:1px; }
    .option.correct .option-letter { color:var(--green); }
    .option.wrong .option-letter { color:var(--red); }
    .submit-btn { background:var(--orange); color:white; border:none; border-radius:var(--radius); padding:12px 28px; font-size:15px; font-weight:600; cursor:pointer; margin-top:1rem; width:100%; transition:opacity 0.15s; }
    .submit-btn:disabled { opacity:.4; cursor:not-allowed; }
    .submit-btn:hover:not(:disabled) { opacity:.88; }
    .identity-box { background:var(--blue-light); border:1px solid var(--blue); border-radius:var(--radius-lg); padding:1.5rem; margin-bottom:1.5rem; }
    .identity-box h2 { font-size:17px; font-weight:600; color:var(--blue); margin-bottom:.5rem; }
    .identity-box p { font-size:13px; color:var(--text2); margin-bottom:1rem; }
    input[type=email] { width:100%; padding:10px 12px; border-radius:var(--radius); border:1px solid var(--border2); font-size:14px; background:var(--bg); color:var(--text); margin-bottom:10px; outline:none; }
    input[type=email]:focus { border-color:var(--orange); box-shadow:0 0 0 3px rgba(255,98,0,.12); }
    .progress-bar { background:var(--bg2); border-radius:4px; height:6px; margin-bottom:1.5rem; overflow:hidden; }
    .progress-fill { height:100%; background:var(--orange); border-radius:4px; transition:width .3s; }
    .summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:1.5rem; }
    .metric { background:var(--bg2); border-radius:var(--radius); padding:1rem; text-align:center; }
    .metric-val { font-size:24px; font-weight:700; }
    .metric-label { font-size:11px; color:var(--text2); margin-top:4px; }
    .filter-row { display:flex; gap:8px; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
    select { padding:8px 12px; border-radius:var(--radius); border:1px solid var(--border2); font-size:13px; background:var(--bg); color:var(--text); cursor:pointer; }
    .result-row { border-bottom:1px solid var(--border); padding:.85rem 0; }
    .result-row:last-child { border-bottom:none; }
    .result-q { font-size:14px; font-weight:600; margin-bottom:4px; }
    .result-meta { font-size:12px; color:var(--text2); margin-bottom:4px; }
    .result-correct { color:var(--green); font-weight:600; }
    .result-wrong { color:var(--red); font-weight:600; }
    .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; vertical-align:middle; }
    .dot-green { background:var(--green); }
    .dot-red { background:var(--red); }
    .explanation-box { background:var(--bg2); border-radius:var(--radius); padding:8px 12px; margin-top:6px; font-size:12px; color:var(--text2); line-height:1.6; }
    .leaderboard { width:100%; border-collapse:collapse; }
    .leaderboard th { background:var(--blue); color:white; padding:10px 14px; text-align:left; font-weight:600; font-size:13px; }
    .leaderboard td { padding:10px 14px; border-bottom:1px solid var(--border); font-size:14px; vertical-align:middle; }
    .leaderboard tr:hover td { background:var(--bg2); }
    .leaderboard tr.me td { background:var(--orange-light); font-weight:600; }
    .score-bar-wrap { background:var(--bg3); border-radius:4px; height:8px; min-width:80px; overflow:hidden; }
    .score-bar-fill { height:100%; background:var(--orange); border-radius:4px; transition:width .4s; }
    .admin-table { width:100%; border-collapse:collapse; font-size:12px; }
    .admin-table th { background:var(--blue); color:white; padding:8px 10px; text-align:left; font-weight:600; white-space:nowrap; }
    .admin-table td { padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
    .admin-table tr:hover td { background:var(--bg2); }
    .correct-tag { background:var(--green-bg); color:var(--green); font-size:11px; font-weight:600; padding:2px 8px; border-radius:var(--radius); display:inline-block; white-space:nowrap; }
    .not-started { background:var(--blue-light); border-radius:var(--radius-lg); padding:2.5rem; text-align:center; }
    .not-started h2 { font-size:20px; font-weight:700; color:var(--blue); margin-bottom:.5rem; }
    .not-started p { font-size:14px; color:var(--text2); }
    .info-msg { background:var(--bg2); border-radius:var(--radius); padding:12px 16px; font-size:13px; color:var(--text2); margin-bottom:1rem; }
    .success-msg { background:var(--green-bg); border:1px solid #97C459; border-radius:var(--radius); padding:12px 16px; font-size:14px; color:var(--green); margin-bottom:1rem; font-weight:600; }
    .error-msg { background:var(--red-bg); border:1px solid #f09595; border-radius:var(--radius); padding:12px 16px; font-size:13px; color:var(--red); margin-bottom:1rem; }
    .resubmit-note { background:var(--amber-bg); border:1px solid #EF9F27; border-radius:var(--radius); padding:10px 14px; font-size:13px; color:var(--amber); margin-bottom:1rem; }
    .tab-row { display:flex; margin-bottom:1.5rem; border-bottom:1px solid var(--border); }
    .tab-btn { padding:8px 18px; border:none; background:none; cursor:pointer; font-size:14px; color:var(--text2); border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; }
    .tab-btn.active { color:var(--orange); border-bottom-color:var(--orange); font-weight:600; }
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border2); border-top-color:var(--orange); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media(max-width:600px){ .summary-grid{grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-logo">PostNL</div>
      <div class="header-sub">Mendix Engineer Quiz &mdash; 16 Weeks</div>
    </div>
    <div class="header-week" id="header-week-label"></div>
  </div>
  <div id="root"></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   CONFIGURATION — fill in your Supabase details
   ═══════════════════════════════════════════════ */
const SUPABASE_URL     = 'https://pfjkxskvwbfezpkvlcnl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmamt4c2t2d2JmZXpwa3ZsY25sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzQ4MjksImV4cCI6MjA4OTI1MDgyOX0.6Mrz1uj1IS1zCsO4Z1t5tTLg9XBhWycXP_8h6nD1APE';

/* ═══════════════════════════════════════════════
   QUIZ SETTINGS
   ═══════════════════════════════════════════════ */
const QUIZ_START = new Date('2026-03-23T00:00:00');
const QUIZ_WEEKS = 16;

function getCurrentWeek() {
  const diff = new Date() - QUIZ_START;
  if (diff < 0) return 0;
  return Math.min(Math.floor(diff / (7 * 24 * 3600 * 1000)) + 1, QUIZ_WEEKS);
}

/* ═══════════════════════════════════════════════
   SUPABASE HELPERS
   ═══════════════════════════════════════════════ */
async function sbRpc(fn, params = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(params)
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function sbGet(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

/* Fetch only current week questions — NO correct_index, NO explanation */
async function fetchWeekQuestions(week) {
  return sbGet(`quiz_questions_public?week=eq.${week}&order=id.asc`);
}

/* Submit answers — scoring happens in the database, correct answers never sent to browser */
async function submitAnswers(email, week, answers) {
  return sbRpc('submit_quiz_answers', { p_email: email, p_week: week, p_answers: answers });
}

/* Fetch my past results — only for weeks < current (closed weeks) */
async function fetchMyResults(email, currentWeek) {
  return sbRpc('get_my_results', { p_email: email, p_current_week: currentWeek });
}

/* Check if I already submitted this week */
async function fetchMySubmission(email, week) {
  const rows = await sbGet(`quiz_submissions?email=eq.${encodeURIComponent(email)}&week=eq.${week}&select=answers,score`);
  return rows.length ? rows[0] : null;
}

/* Leaderboard */
async function fetchLeaderboard() {
  const rows = await sbGet('quiz_submissions?select=email,week,score');
  const map = {};
  rows.forEach(r => {
    if (!map[r.email]) map[r.email] = { email: r.email, weeks: 0, score: 0 };
    map[r.email].weeks++;
    map[r.email].score += (r.score || 0);
  });
  return Object.values(map).sort((a, b) => b.score - a.score);
}

/* Admin: all questions with answers */
async function fetchAllQuestionsAdmin() {
  return sbRpc('get_all_questions_admin', {});
}

/* Admin: all submissions */
async function fetchAllSubmissionsAdmin() {
  return sbGet('quiz_submissions?select=email,week,answers,score,submitted_at&order=week.asc,email.asc');
}

/* ═══════════════════════════════════════════════
   LOCAL STORAGE — remember email across visits
   ═══════════════════════════════════════════════ */
function getParticipantKey() { return 'u_' + (navigator.userAgent||'').replace(/\W/g,'').slice(0,20); }
function rememberEmail(email) {
  try { const d = JSON.parse(localStorage.getItem('mxquiz_id')||'{}'); d[getParticipantKey()] = email; localStorage.setItem('mxquiz_id', JSON.stringify(d)); } catch(e){}
}
function recallEmail() {
  try { const d = JSON.parse(localStorage.getItem('mxquiz_id')||'{}'); return d[getParticipantKey()] || ''; } catch(e){ return ''; }
}

/* ═══════════════════════════════════════════════
   APP STATE
   ═══════════════════════════════════════════════ */
const CATEGORIES = ['Mendix Basics','Domain Model & Data','Microflows & Logic','Pages & UI','Integration & APIs','Security & Access','Performance & Deployment','Version Control & Teamwork','Best Practices','PostNL & Logistics Context'];

let state = {
  page: 'quiz',
  email: '',
  confirmedEmail: recallEmail(),
  currentWeek: getCurrentWeek(),
  weekQuestions: null,      // fetched from Supabase — no correct answers
  answers: {},              // participant's selected answers (indices)
  existingSubmission: null, // {answers, score} if already submitted this week
  loadingQuiz: false,
  loadingSubmit: false,
  successMsg: '',
  errorMsg: '',
  results: null,            // fetched from get_my_results()
  loadingResults: false,
  leaderboard: null,
  loadingLeaderboard: false,
  adminTab: 'questions',
  adminQuestions: null,
  adminSubmissions: null,
  loadingAdmin: false,
  filterWeek: 0,
  filterCat: '',
  sortField: 'week',
  isAdmin: location.search.includes('admin=true')
};

/* ═══════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════ */
function render() {
  const root = document.getElementById('root');
  if (!root) return;
  root.innerHTML = '';

  const wl = document.getElementById('header-week-label');
  if (wl) wl.textContent = state.currentWeek > 0 ? `Week ${state.currentWeek} of ${QUIZ_WEEKS}` : 'Starting soon';

  const nav = document.createElement('div'); nav.className = 'nav';
  const pages = [['quiz','Quiz'],['results','My Results'],['leaderboard','Leaderboard']];
  if (state.isAdmin) pages.push(['admin','Admin']);
  pages.forEach(([id, label]) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (state.page === id ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { state.page = id; state.successMsg = ''; state.errorMsg = ''; render(); };
    nav.appendChild(btn);
  });
  root.appendChild(nav);

  const c = document.createElement('div'); c.className = 'container';
  root.appendChild(c);

  if (state.page === 'quiz') renderQuiz(c);
  else if (state.page === 'results') renderResults(c);
  else if (state.page === 'leaderboard') renderLeaderboard(c);
  else renderAdmin(c);
}

/* ── Identity box ── */
function renderIdentityBox(container, onConfirm) {
  if (state.confirmedEmail) { onConfirm(); return; }
  const box = document.createElement('div'); box.className = 'identity-box';
  box.innerHTML = '<h2>Welcome to the PostNL Mendix Quiz</h2><p>Enter your PostNL email address to participate.</p>';
  const inp = document.createElement('input'); inp.type = 'email';
  inp.placeholder = 'your.name@postnl.nl'; inp.value = state.email || '';
  inp.oninput = e => state.email = e.target.value;
  inp.onkeydown = e => { if (e.key === 'Enter') go(); };
  const btn = document.createElement('button'); btn.className = 'submit-btn';
  btn.style.cssText = 'width:auto;padding:8px 24px;margin-top:0';
  btn.textContent = 'Start';
  function go() {
    if (state.email && state.email.includes('@')) {
      state.confirmedEmail = state.email;
      rememberEmail(state.email);
      render();
    } else { alert('Please enter a valid email address.'); }
  }
  btn.onclick = go;
  box.appendChild(inp); box.appendChild(btn); container.appendChild(box);
}

/* ── Quiz page ── */
function renderQuiz(c) {
  renderIdentityBox(c, () => {
    const cw = state.currentWeek;
    if (cw === 0) {
      const m = document.createElement('div'); m.className = 'not-started';
      m.innerHTML = '<h2>Quiz starts March 23, 2026</h2><p>Week 1 questions will be available from Monday, March 23.</p>';
      c.appendChild(m); return;
    }

    // Messages
    if (state.successMsg) { const m = document.createElement('div'); m.className = 'success-msg'; m.textContent = state.successMsg; c.appendChild(m); }
    if (state.errorMsg)   { const m = document.createElement('div'); m.className = 'error-msg';   m.textContent = state.errorMsg;   c.appendChild(m); }

    // Fetch questions + existing submission on first load
    if (!state.weekQuestions && !state.loadingQuiz) {
      state.loadingQuiz = true;
      const m = document.createElement('div'); m.className = 'info-msg';
      m.innerHTML = '<span class="spinner"></span>Loading this week\'s questions...';
      c.appendChild(m);
      Promise.all([
        fetchWeekQuestions(cw),
        fetchMySubmission(state.confirmedEmail, cw)
      ]).then(([qs, existing]) => {
        state.weekQuestions = qs;
        state.existingSubmission = existing;
        if (existing && Object.keys(state.answers).length === 0) {
          qs.forEach((_, i) => { state.answers[i] = existing.answers[i]; });
        }
        state.loadingQuiz = false;
        render();
      }).catch(err => {
        state.loadingQuiz = false;
        state.errorMsg = 'Could not load questions: ' + err.message;
        render();
      });
      return;
    }

    if (state.loadingQuiz) {
      const m = document.createElement('div'); m.className = 'info-msg';
      m.innerHTML = '<span class="spinner"></span>Loading...'; c.appendChild(m); return;
    }

    const qs = state.weekQuestions || [];

    if (state.existingSubmission && !state.successMsg) {
      const note = document.createElement('div'); note.className = 'resubmit-note';
      note.textContent = `You already submitted week ${cw} (score: ${state.existingSubmission.score}/${qs.length}). You can update and resubmit until Sunday.`;
      c.appendChild(note);
    }

    const answered = Object.keys(state.answers).length;
    const pct = qs.length ? Math.round(answered / qs.length * 100) : 0;
    const prog = document.createElement('div');
    prog.innerHTML = `<div style="font-size:13px;color:var(--text2);margin-bottom:6px;">${answered} of ${qs.length} answered &mdash; Week ${cw}</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
    c.appendChild(prog);

    qs.forEach((q, i) => {
      const card = document.createElement('div'); card.className = 'card';
      card.innerHTML = `<span class="week-badge">Week ${cw}</span><span class="cat-badge">${q.category}</span><p class="question-text">${i+1}. ${q.question}</p>`;
      const opts = document.createElement('div'); opts.className = 'options';
      [q.option_a, q.option_b, q.option_c, q.option_d, q.option_e].forEach((opt, oi) => {
        const btn = document.createElement('button');
        btn.className = 'option' + (state.answers[i] === oi ? ' selected' : '');
        btn.innerHTML = `<span class="option-letter">${String.fromCharCode(65+oi)}</span>${opt}`;
        btn.onclick = () => { state.answers[i] = oi; render(); };
        opts.appendChild(btn);
      });
      card.appendChild(opts); c.appendChild(card);
    });

    const allAnswered = qs.length > 0 && answered === qs.length;
    const subBtn = document.createElement('button'); subBtn.className = 'submit-btn';
    subBtn.disabled = !allAnswered || state.loadingSubmit;
    subBtn.textContent = state.loadingSubmit ? 'Submitting...'
      : allAnswered ? (state.existingSubmission ? `Resubmit Week ${cw} Answers` : `Submit Week ${cw} Answers`)
      : `Answer all ${qs.length} questions to submit`;
    subBtn.onclick = async () => {
      if (!allAnswered || state.loadingSubmit) return;
      state.loadingSubmit = true; render();
      try {
        const answersArr = qs.map((_, i) => state.answers[i]);
        const score = await submitAnswers(state.confirmedEmail, cw, answersArr);
        state.existingSubmission = { answers: answersArr, score };
        state.leaderboard = null; // force refresh
        state.successMsg = `${state.existingSubmission ? 'Resubmitted' : 'Submitted'}! You scored ${score} out of ${qs.length}. Full results available after this week closes.`;
        state.errorMsg = '';
      } catch(err) {
        state.errorMsg = 'Submission failed: ' + err.message;
      }
      state.loadingSubmit = false; render();
    };
    c.appendChild(subBtn);
  });
}

/* ── Results page ── */
function renderResults(c) {
  renderIdentityBox(c, () => {
    const cw = state.currentWeek;

    if (!state.results && !state.loadingResults) {
      state.loadingResults = true;
      const m = document.createElement('div'); m.className = 'info-msg';
      m.innerHTML = '<span class="spinner"></span>Loading your results...'; c.appendChild(m);
      fetchMyResults(state.confirmedEmail, cw).then(rows => {
        state.results = rows || [];
        state.loadingResults = false;
        render();
      }).catch(err => {
        state.results = [];
        state.loadingResults = false;
        state.errorMsg = 'Could not load results: ' + err.message;
        render();
      });
      return;
    }
    if (state.loadingResults) {
      const m = document.createElement('div'); m.className = 'info-msg';
      m.innerHTML = '<span class="spinner"></span>Loading...'; c.appendChild(m); return;
    }

    const rows = state.results || [];
    const totalQ = rows.length;
    const totalCorrect = rows.filter(r => r.is_correct).length;
    const weeksPlayed = new Set(rows.map(r => r.week)).size;

    const sg = document.createElement('div'); sg.className = 'summary-grid';
    sg.innerHTML = `
      <div class="metric"><div class="metric-val">${weeksPlayed}</div><div class="metric-label">Weeks played</div></div>
      <div class="metric"><div class="metric-val">${totalQ}</div><div class="metric-label">Questions answered</div></div>
      <div class="metric"><div class="metric-val">${totalCorrect}</div><div class="metric-label">Correct</div></div>
      <div class="metric"><div class="metric-val">${totalQ > 0 ? Math.round(totalCorrect/totalQ*100) : 0}%</div><div class="metric-label">Score</div></div>`;
    c.appendChild(sg);

    const refreshBtn = document.createElement('button'); refreshBtn.className = 'nav-btn'; refreshBtn.style.marginBottom = '1rem';
    refreshBtn.textContent = 'Refresh results';
    refreshBtn.onclick = () => { state.results = null; render(); };
    c.appendChild(refreshBtn);

    if (cw <= 1) {
      const m = document.createElement('div'); m.className = 'info-msg';
      m.textContent = 'Results for completed weeks appear here. Week 1 closes March 29, 2026.'; c.appendChild(m); return;
    }
    if (rows.length === 0) {
      const m = document.createElement('div'); m.className = 'info-msg';
      m.textContent = 'No completed weeks found for your email. Participate in weekly quizzes to see your results here.'; c.appendChild(m); return;
    }

    const fr = document.createElement('div'); fr.className = 'filter-row';
    const weekSel = document.createElement('select');
    weekSel.innerHTML = '<option value="0">All weeks</option>';
    [...new Set(rows.map(r => r.week))].sort((a,b)=>a-b).forEach(w => weekSel.innerHTML += `<option value="${w}"${state.filterWeek==w?' selected':''}>Week ${w}</option>`);
    weekSel.value = state.filterWeek; weekSel.onchange = e => { state.filterWeek = parseInt(e.target.value); render(); };
    const catSel = document.createElement('select');
    catSel.innerHTML = '<option value="">All categories</option>';
    CATEGORIES.forEach(cat => catSel.innerHTML += `<option value="${cat}"${state.filterCat===cat?' selected':''}>${cat}</option>`);
    catSel.value = state.filterCat; catSel.onchange = e => { state.filterCat = e.target.value; render(); };
    const sortSel = document.createElement('select');
    sortSel.innerHTML = '<option value="week">Sort by week</option><option value="cat">Sort by category</option><option value="status">Wrong answers first</option>';
    sortSel.value = state.sortField; sortSel.onchange = e => { state.sortField = e.target.value; render(); };
    fr.appendChild(weekSel); fr.appendChild(catSel); fr.appendChild(sortSel); c.appendChild(fr);

    let filtered = rows.filter(r => (state.filterWeek===0||r.week===state.filterWeek) && (!state.filterCat||r.category===state.filterCat));
    if (state.sortField==='week') filtered.sort((a,b)=>a.week-b.week);
    else if (state.sortField==='cat') filtered.sort((a,b)=>a.category.localeCompare(b.category));
    else filtered.sort((a,b)=>(a.is_correct?1:0)-(b.is_correct?1:0));

    const card = document.createElement('div'); card.className = 'card';
    const optKeys = ['option_a','option_b','option_c','option_d','option_e'];
    filtered.forEach(r => {
      const row = document.createElement('div'); row.className = 'result-row';
      const given = r.given_answer;
      const givenTxt = given !== null ? `${String.fromCharCode(65+given)}: ${r[optKeys[given]]}` : 'Not answered';
      const correctTxt = `${String.fromCharCode(65+r.correct_index)}: ${r[optKeys[r.correct_index]]}`;
      row.innerHTML = `
        <div class="result-q"><span class="status-dot ${r.is_correct?'dot-green':'dot-red'}"></span>${r.question}</div>
        <div class="result-meta">Week ${r.week} &nbsp;&middot;&nbsp; ${r.category}</div>
        <div style="font-size:13px;line-height:1.6">
          <span class="${r.is_correct?'result-correct':'result-wrong'}">Your answer: ${givenTxt}</span>
          ${!r.is_correct ? `<br><span class="result-correct">Correct: ${correctTxt}</span>` : ''}
        </div>
        <div class="explanation-box">${r.explanation}</div>`;
      card.appendChild(row);
    });
    if (filtered.length === 0) card.innerHTML = '<div class="info-msg" style="margin:0">No results match the current filter.</div>';
    c.appendChild(card);
  });
}

/* ── Leaderboard ── */
function renderLeaderboard(c) {
  const h = document.createElement('h2'); h.style.cssText = 'font-size:18px;font-weight:700;margin-bottom:1rem';
  h.textContent = 'Live Leaderboard'; c.appendChild(h);

  if (!state.leaderboard && !state.loadingLeaderboard) {
    state.loadingLeaderboard = true;
    const m = document.createElement('div'); m.className = 'info-msg';
    m.innerHTML = '<span class="spinner"></span>Loading leaderboard...'; c.appendChild(m);
    fetchLeaderboard().then(rows => {
      state.leaderboard = rows;
      state.loadingLeaderboard = false;
      render();
    }).catch(() => { state.loadingLeaderboard = false; render(); });
    return;
  }

  const refreshBtn = document.createElement('button'); refreshBtn.className = 'nav-btn'; refreshBtn.style.marginBottom = '1rem';
  refreshBtn.textContent = 'Refresh'; refreshBtn.onclick = () => { state.leaderboard = null; render(); };
  c.appendChild(refreshBtn);

  if (!state.leaderboard || state.leaderboard.length === 0) {
    const m = document.createElement('div'); m.className = 'info-msg'; m.textContent = 'No submissions yet. Be the first!'; c.appendChild(m); return;
  }

  const maxScore = state.leaderboard[0]?.score || 1;
  const wrap = document.createElement('div'); wrap.style.overflowX = 'auto';
  const table = document.createElement('table'); table.className = 'leaderboard';
  table.innerHTML = '<thead><tr><th>#</th><th>Participant</th><th>Weeks</th><th>Total score</th><th style="min-width:120px">Progress</th></tr></thead>';
  const tbody = document.createElement('tbody');
  state.leaderboard.forEach((row, i) => {
    const tr = document.createElement('tr');
    if (row.email === state.confirmedEmail) tr.className = 'me';
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    const short = row.email.length > 28 ? row.email.slice(0,25)+'...' : row.email;
    const isMe = row.email === state.confirmedEmail;
    tr.innerHTML = `
      <td>${medal}</td>
      <td style="font-size:13px">${short}${isMe?' <span style="color:var(--orange);font-size:11px;font-weight:700">(you)</span>':''}</td>
      <td style="text-align:center">${row.weeks}</td>
      <td style="text-align:center;font-weight:700;color:var(--orange)">${row.score}</td>
      <td><div class="score-bar-wrap"><div class="score-bar-fill" style="width:${Math.round(row.score/maxScore*100)}%"></div></div></td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody); wrap.appendChild(table); c.appendChild(wrap);
}

/* ── Admin ── */
function renderAdmin(c) {
  if (!state.isAdmin) { c.innerHTML = '<div class="info-msg">Admin access requires ?admin=true in the URL.</div>'; return; }

  const tabRow = document.createElement('div'); tabRow.className = 'tab-row';
  [['questions','All Questions & Answers'],['submissions','All Submissions'],['lb','Leaderboard']].forEach(([id, label]) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (state.adminTab===id?' active':'');
    btn.textContent = label; btn.onclick = () => { state.adminTab = id; render(); };
    tabRow.appendChild(btn);
  });
  c.appendChild(tabRow);

  if (state.adminTab === 'lb') { renderLeaderboard(c); return; }

  if (state.adminTab === 'questions') {
    if (!state.adminQuestions && !state.loadingAdmin) {
      state.loadingAdmin = true;
      const m = document.createElement('div'); m.className = 'info-msg';
      m.innerHTML = '<span class="spinner"></span>Loading questions...'; c.appendChild(m);
      fetchAllQuestionsAdmin().then(rows => {
        state.adminQuestions = rows; state.loadingAdmin = false; render();
      }).catch(err => { state.loadingAdmin = false; state.errorMsg = err.message; render(); });
      return;
    }

    const fr = document.createElement('div'); fr.className = 'filter-row';
    const weekSel = document.createElement('select');
    weekSel.innerHTML = '<option value="0">All weeks</option>';
    for (let w=1;w<=16;w++) weekSel.innerHTML += `<option value="${w}"${state.filterWeek==w?' selected':''}>Week ${w}</option>`;
    weekSel.value = state.filterWeek; weekSel.onchange = e => { state.filterWeek = parseInt(e.target.value); render(); };
    const catSel = document.createElement('select');
    catSel.innerHTML = '<option value="">All categories</option>';
    CATEGORIES.forEach(cat => catSel.innerHTML += `<option value="${cat}"${state.filterCat===cat?' selected':''}>${cat}</option>`);
    catSel.value = state.filterCat; catSel.onchange = e => { state.filterCat = e.target.value; render(); };
    const refreshBtn = document.createElement('button'); refreshBtn.className = 'nav-btn';
    refreshBtn.textContent = 'Refresh'; refreshBtn.onclick = () => { state.adminQuestions = null; render(); };
    fr.appendChild(weekSel); fr.appendChild(catSel); fr.appendChild(refreshBtn); c.appendChild(fr);

    const qs = (state.adminQuestions||[]).filter(q =>
      (state.filterWeek===0||q.week===state.filterWeek) && (!state.filterCat||q.category===state.filterCat));
    const wrap = document.createElement('div'); wrap.style.overflowX = 'auto';
    const table = document.createElement('table'); table.className = 'admin-table';
    table.innerHTML = '<thead><tr><th>Wk</th><th>Category</th><th>Question</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>Correct</th><th>Explanation</th></tr></thead>';
    const tbody = document.createElement('tbody');
    qs.forEach(q => {
      const opts = [q.option_a,q.option_b,q.option_c,q.option_d,q.option_e];
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${q.week}</td><td style="white-space:nowrap;font-size:11px">${q.category}</td><td style="min-width:180px;max-width:220px">${q.question}</td>${opts.map(o=>`<td style="min-width:100px;max-width:140px;font-size:11px">${o}</td>`).join('')}<td><span class="correct-tag">${String.fromCharCode(65+q.correct_index)}: ${opts[q.correct_index]}</span></td><td style="min-width:180px;font-size:11px;color:var(--text2)">${q.explanation}</td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody); wrap.appendChild(table); c.appendChild(wrap);

  } else {
    if (!state.adminSubmissions && !state.loadingAdmin) {
      state.loadingAdmin = true;
      const m = document.createElement('div'); m.className = 'info-msg';
      m.innerHTML = '<span class="spinner"></span>Loading submissions...'; c.appendChild(m);
      fetchAllSubmissionsAdmin().then(rows => {
        state.adminSubmissions = rows; state.loadingAdmin = false; render();
      }).catch(err => { state.loadingAdmin = false; state.errorMsg = err.message; render(); });
      return;
    }

    const refreshBtn = document.createElement('button'); refreshBtn.className = 'nav-btn'; refreshBtn.style.marginBottom='1rem';
    refreshBtn.textContent = 'Refresh'; refreshBtn.onclick = () => { state.adminSubmissions = null; render(); };
    c.appendChild(refreshBtn);

    if (!state.adminSubmissions || state.adminSubmissions.length === 0) {
      c.innerHTML += '<div class="info-msg">No submissions yet.</div>'; return;
    }
    const wrap = document.createElement('div'); wrap.style.overflowX = 'auto';
    const table = document.createElement('table'); table.className = 'admin-table';
    table.innerHTML = '<thead><tr><th>Email</th><th>Week</th><th>Score</th><th>Submitted</th></tr></thead>';
    const tbody = document.createElement('tbody');
    state.adminSubmissions.forEach(r => {
      const when = r.submitted_at ? new Date(r.submitted_at).toLocaleString('nl-NL',{dateStyle:'short',timeStyle:'short'}) : '—';
      const tr = document.createElement('tr');
      tr.innerHTML = `<td style="font-size:12px">${r.email}</td><td>Week ${r.week}</td><td style="font-weight:700">${r.score ?? '?'}/5</td><td style="font-size:11px;color:var(--text2);white-space:nowrap">${when}</td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody); wrap.appendChild(table); c.appendChild(wrap);
  }
}

render();
</script>
</body>
</html>
