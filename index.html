<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostNL Mendix Daily Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6200; --orange-light: #FFF0E6; --orange-mid: #FFD5B3;
      --blue: #003087; --blue-light: #E6EBF5;
      --bg: #ffffff; --bg2: #f5f5f5; --bg3: #ececec;
      --text: #1a1a1a; --text2: #555555; --text3: #999999;
      --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.20);
      --green: #2d6a0f; --green-bg: #e8f5d9;
      --red: #a32020; --red-bg: #fde8e8;
      --amber: #7a4800; --amber-bg: #fff3d9;
      --radius: 8px; --radius-lg: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18181b; --bg2: #27272a; --bg3: #3f3f46;
        --text: #f4f4f5; --text2: #a1a1aa; --text3: #71717a;
        --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.18);
        --blue-light: #0f1f42; --orange-light: #2e1600;
        --green-bg: #132b06; --red-bg: #2b0a0a; --amber-bg: #2b1800;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    #app { max-width: 680px; margin: 0 auto; padding: 0 1rem 4rem; }

    /* ── Header ── */
    .header {
      background: var(--blue); color: #fff;
      padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; margin: 0 -1rem 2rem;
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-logo { font-size: 18px; font-weight: 700; color: var(--orange); letter-spacing: -0.3px; }
    .header-sep { color: rgba(255,255,255,0.3); font-size: 16px; }
    .header-title { font-size: 13px; color: rgba(255,255,255,0.8); letter-spacing: 0.02em; }
    .header-date { font-size: 12px; color: rgba(255,255,255,0.55); font-variant-numeric: tabular-nums; }

    /* ── Shared card ── */
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.75rem;
    }

    /* ── Email gate ── */
    .email-section { padding-top: 2rem; }
    .email-section h1 { font-size: 22px; font-weight: 600; margin-bottom: .4rem; }
    .email-section p { color: var(--text2); font-size: 14px; line-height: 1.6; margin-bottom: 1.5rem; }
    .input-row { display: flex; gap: 10px; }
    .email-input {
      flex: 1; height: 42px; border: 1px solid var(--border2);
      border-radius: var(--radius); background: var(--bg); color: var(--text);
      padding: 0 12px; font-size: 15px; outline: none;
    }
    .email-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,98,0,.15); }
    .btn {
      height: 42px; padding: 0 20px; border-radius: var(--radius);
      font-size: 14px; font-weight: 600; cursor: pointer;
      border: none; transition: opacity .15s, transform .1s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--orange); color: #fff; }
    .btn-primary:hover { opacity: .9; }
    .btn-secondary { background: var(--bg3); color: var(--text2); }
    .btn-secondary:hover { background: var(--border2); }

    /* ── Loading / status ── */
    .spinner {
      width: 36px; height: 36px; margin: 3rem auto; display: block;
      border: 3px solid var(--border2); border-top-color: var(--orange);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-msg {
      text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 15px;
    }
    .status-msg strong { display: block; font-size: 28px; margin-bottom: .5rem; }

    /* ── Question card ── */
    .q-meta {
      display: flex; align-items: center; gap: 8px; margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 11px; font-weight: 600; padding: 3px 9px;
      border-radius: 20px; letter-spacing: .03em;
    }
    .badge-cat { background: var(--blue-light); color: var(--blue); }
    .badge-diff-easy { background: var(--green-bg); color: var(--green); }
    .badge-diff-medium { background: var(--amber-bg); color: var(--amber); }
    .badge-diff-hard { background: var(--red-bg); color: var(--red); }
    .q-text {
      font-size: 17px; font-weight: 500; line-height: 1.55;
      margin-bottom: 1.5rem; color: var(--text);
    }
    .q-text code {
      background: var(--bg3); padding: 1px 5px; border-radius: 4px;
      font-size: 14px; font-family: 'Menlo', 'Consolas', monospace;
    }

    /* ── Options ── */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 15px; border-radius: var(--radius);
      border: 1.5px solid var(--border); background: var(--bg);
      cursor: pointer; transition: border-color .15s, background .15s;
      text-align: left; width: 100%;
    }
    .option:hover:not(:disabled) { border-color: var(--orange); background: var(--orange-light); }
    .option:disabled { cursor: default; }
    .option-letter {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--bg3); color: var(--text2);
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .option-text { font-size: 14px; line-height: 1.5; color: var(--text); }
    .option.selected { border-color: var(--orange); background: var(--orange-light); }
    .option.selected .option-letter { background: var(--orange); color: #fff; }
    .option.correct { border-color: var(--green); background: var(--green-bg); }
    .option.correct .option-letter { background: var(--green); color: #fff; }
    .option.wrong { border-color: var(--red); background: var(--red-bg); }
    .option.wrong .option-letter { background: var(--red); color: #fff; }

    /* ── Submit row ── */
    .submit-row { margin-top: 1.25rem; display: flex; gap: 10px; align-items: center; }
    .btn-submit { background: var(--orange); color: #fff; height: 44px; padding: 0 24px; }
    .btn-submit:disabled { opacity: .45; cursor: default; }

    /* ── Result ── */
    .result-banner {
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; align-items: flex-start; gap: 10px; margin-top: 1.25rem;
    }
    .result-banner.correct { background: var(--green-bg); border: 1px solid var(--green); }
    .result-banner.wrong { background: var(--red-bg); border: 1px solid var(--red); }
    .result-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    .result-label { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .result-label.correct { color: var(--green); }
    .result-label.wrong { color: var(--red); }
    .result-explanation { font-size: 13px; color: var(--text2); line-height: 1.6; }

    /* ── Feedback widget ── */
    .feedback-section {
      margin-top: 1.75rem; padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .feedback-title {
      font-size: 13px; font-weight: 600; color: var(--text2);
      margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .05em;
    }
    .stars { display: flex; gap: 6px; margin-bottom: 1rem; }
    .star {
      font-size: 24px; cursor: pointer; color: var(--border2);
      transition: color .1s, transform .1s;
      background: none; border: none; padding: 0; line-height: 1;
    }
    .star:hover, .star.active { color: #f5a623; }
    .star:hover { transform: scale(1.15); }
    .feedback-comment {
      width: 100%; min-height: 70px; resize: vertical;
      border: 1px solid var(--border2); border-radius: var(--radius);
      background: var(--bg); color: var(--text);
      padding: 10px 12px; font-size: 13px; font-family: inherit;
      outline: none; margin-bottom: .75rem;
    }
    .feedback-comment:focus { border-color: var(--orange); }
    .feedback-sent { font-size: 13px; color: var(--green); font-weight: 500; }
    .feedback-error { font-size: 13px; color: var(--red); }

    /* ── Already answered banner ── */
    .already-banner {
      background: var(--blue-light); border: 1px solid rgba(0,48,135,.2);
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 13px; color: var(--blue); margin-bottom: 1rem;
    }

    /* ── Footer / change user ── */
    .footer-bar {
      margin-top: 2rem; display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: var(--text3);
    }
    .link-btn {
      background: none; border: none; cursor: pointer;
      color: var(--orange); font-size: 12px; padding: 0; text-decoration: underline;
    }

    /* ── Error ── */
    .error-box {
      background: var(--red-bg); border: 1px solid var(--red);
      border-radius: var(--radius); padding: 12px 16px;
      font-size: 13px; color: var(--red); margin-top: 1rem;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-brand">
      <span class="header-logo">PostNL</span>
      <span class="header-sep">|</span>
      <span class="header-title">Mendix Daily Quiz</span>
    </div>
    <span class="header-date" id="header-date"></span>
  </div>
  <div id="root"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG — replace with your API Gateway endpoint after running deploy.sh
// ─────────────────────────────────────────────────────────────────────────────
const API = 'https://r4800dlclj.execute-api.eu-west-1.amazonaws.com/prod';

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
const state = {
  email: localStorage.getItem('quiz_email') || '',
  loading: false,
  error: null,
  question: null,
  done: false,
  doneMessage: '',
  selectedIndex: null,
  submitted: false,
  correct: null,
  correctIndex: null,
  explanation: null,
  alreadyAnswered: false,
  // feedback
  feedbackRating: 0,
  feedbackComment: '',
  feedbackSent: false,
  feedbackError: null,
  feedbackSending: false,
};

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');

  if (!state.email) {
    root.innerHTML = renderEmailGate();
    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitEmail();
    });
    document.getElementById('btn-start').addEventListener('click', submitEmail);
    return;
  }

  if (state.loading) {
    root.innerHTML = `<div class="card" style="margin-top:1.5rem"><div class="spinner"></div><p style="text-align:center;color:var(--text2);font-size:14px;padding-bottom:1.5rem">Loading your question…</p></div>`;
    return;
  }

  if (state.error) {
    root.innerHTML = `
      <div class="card" style="margin-top:1.5rem">
        <div class="error-box">${esc(state.error)}</div>
        <div style="margin-top:1rem;display:flex;gap:10px">
          <button class="btn btn-primary" onclick="loadQuestion()">Retry</button>
          <button class="btn btn-secondary" onclick="changeUser()">Change user</button>
        </div>
      </div>`;
    return;
  }

  if (state.done) {
    root.innerHTML = `
      <div class="card" style="margin-top:1.5rem">
        <div class="status-msg">
          <strong>🎓</strong>
          ${esc(state.doneMessage || 'All questions completed — well done!')}
          <p style="margin-top:.75rem;font-size:13px;color:var(--text3)">Check back later for new questions.</p>
        </div>
        ${renderFooter()}
      </div>`;
    attachFooter();
    return;
  }

  if (!state.question) return;

  const q = state.question;
  const diffClass = `badge-diff-${q.difficulty || 'medium'}`;

  root.innerHTML = `
    <div class="card" style="margin-top:1.5rem">
      ${state.alreadyAnswered ? `<div class="already-banner">You already answered today's question.</div>` : ''}

      <div class="q-meta">
        <span class="badge badge-cat">${esc(q.category)}</span>
        <span class="badge ${diffClass}">${esc(q.difficulty || 'medium')}</span>
      </div>

      <p class="q-text">${esc(q.text)}</p>

      <div class="options" id="options-list">
        ${q.options.map((opt, i) => {
          let cls = 'option';
          if (state.submitted) {
            if (i === state.correctIndex) cls += ' correct';
            else if (i === state.selectedIndex && i !== state.correctIndex) cls += ' wrong';
          } else if (i === state.selectedIndex) {
            cls += ' selected';
          }
          return `<button class="${cls}" data-index="${i}" ${state.submitted ? 'disabled' : ''} onclick="selectOption(${i})">
            <span class="option-letter">${'ABCDE'[i]}</span>
            <span class="option-text">${esc(opt)}</span>
          </button>`;
        }).join('')}
      </div>

      ${!state.submitted ? `
        <div class="submit-row">
          <button class="btn btn-submit" id="btn-submit" onclick="submitAnswer()" ${state.selectedIndex === null ? 'disabled' : ''}>
            Submit answer
          </button>
        </div>
      ` : `
        <div class="result-banner ${state.correct ? 'correct' : 'wrong'}">
          <span class="result-icon">${state.correct ? '✓' : '✗'}</span>
          <div>
            <div class="result-label ${state.correct ? 'correct' : 'wrong'}">
              ${state.correct ? 'Correct!' : 'Not quite — the correct answer is ' + 'ABCDE'[state.correctIndex]}
            </div>
            <div class="result-explanation">${esc(state.explanation || '')}</div>
          </div>
        </div>
        ${renderFeedback()}
      `}
    </div>
    ${renderFooter()}`;

  if (state.submitted) attachFeedback();
  attachFooter();
}

function renderEmailGate() {
  return `
    <div class="email-section">
      <h1>Mendix question of the day</h1>
      <p>One new Mendix question every day. You'll get a random question you haven't seen before — answer it, see the explanation, and leave feedback.</p>
      <div class="card" style="margin-top:.5rem">
        <div style="margin-bottom:.75rem;font-size:14px;font-weight:500">Enter your PostNL email to start</div>
        <div class="input-row">
          <input type="email" id="email-input" class="email-input"
            placeholder="you@postnl.nl"
            value="${esc(state.email)}">
          <button id="btn-start" class="btn btn-primary">Start →</button>
        </div>
        ${state.error ? `<div class="error-box" style="margin-top:.75rem">${esc(state.error)}</div>` : ''}
      </div>
    </div>`;
}

function renderFeedback() {
  if (state.feedbackSent) {
    return `<div class="feedback-section"><span class="feedback-sent">✓ Feedback sent — thank you!</span></div>`;
  }
  const stars = [1,2,3,4,5].map(n =>
    `<button class="star ${n <= state.feedbackRating ? 'active' : ''}" onclick="setRating(${n})">★</button>`
  ).join('');
  return `
    <div class="feedback-section">
      <div class="feedback-title">Rate this question</div>
      <div class="stars">${stars}</div>
      <textarea class="feedback-comment" id="feedback-comment" placeholder="Optional: was anything unclear or incorrect?" maxlength="500">${esc(state.feedbackComment)}</textarea>
      <button class="btn btn-secondary" id="btn-feedback" onclick="submitFeedback()" ${state.feedbackRating === 0 || state.feedbackSending ? 'disabled' : ''}>
        ${state.feedbackSending ? 'Sending…' : 'Send feedback'}
      </button>
      ${state.feedbackError ? `<div class="feedback-error" style="margin-top:.5rem">${esc(state.feedbackError)}</div>` : ''}
    </div>`;
}

function renderFooter() {
  return `
    <div class="footer-bar" id="footer-bar">
      <span>Signed in as <strong>${esc(state.email)}</strong></span>
      <button class="link-btn" onclick="changeUser()">Change</button>
    </div>`;
}

function attachFeedback() {
  const ta = document.getElementById('feedback-comment');
  if (ta) ta.addEventListener('input', e => { state.feedbackComment = e.target.value; });
}

function attachFooter() {}

// ─────────────────────────────────────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────────────────────────────────────
function submitEmail() {
  const input = document.getElementById('email-input');
  const email = input ? input.value.trim() : state.email;
  if (!email || !email.includes('@')) {
    state.error = 'Please enter a valid email address.';
    render(); return;
  }
  state.email = email;
  state.error = null;
  localStorage.setItem('quiz_email', email);
  loadQuestion();
}

async function loadQuestion() {
  state.loading = true;
  state.error = null;
  state.question = null;
  state.selectedIndex = null;
  state.submitted = false;
  state.correct = null;
  state.correctIndex = null;
  state.explanation = null;
  state.alreadyAnswered = false;
  state.done = false;
  state.feedbackRating = 0;
  state.feedbackComment = '';
  state.feedbackSent = false;
  state.feedbackError = null;
  render();

  try {
    const res = await fetch(`${API}/question?email=${encodeURIComponent(state.email)}`);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    if (data.done) {
      state.done = true;
      state.doneMessage = data.message;
    } else {
      state.question = data.question;
      state.alreadyAnswered = data.alreadyAnswered || false;
      if (data.alreadyAnswered) {
        state.submitted = true;
        state.selectedIndex = data.selectedIndex;
        state.correct = data.correct;
        state.correctIndex = data.correctIndex;
        state.explanation = data.explanation;
      }
    }
  } catch (err) {
    state.error = err.message || 'Could not reach the quiz API. Check your API endpoint configuration.';
  }

  state.loading = false;
  render();
}

function selectOption(index) {
  if (state.submitted) return;
  state.selectedIndex = index;
  render();
}

async function submitAnswer() {
  if (state.selectedIndex === null || state.submitted) return;

  const btnSubmit = document.getElementById('btn-submit');
  if (btnSubmit) { btnSubmit.disabled = true; btnSubmit.textContent = 'Submitting…'; }

  try {
    const res = await fetch(`${API}/answer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: state.email,
        questionId: state.question.questionId,
        answerIndex: state.selectedIndex
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    state.submitted = true;
    state.correct = data.correct;
    state.correctIndex = data.correctIndex;
    state.explanation = data.explanation;
  } catch (err) {
    state.error = err.message;
  }

  render();
}

function setRating(n) {
  state.feedbackRating = n;
  render();
  // keep textarea content
  const ta = document.getElementById('feedback-comment');
  if (ta) { ta.value = state.feedbackComment; ta.addEventListener('input', e => { state.feedbackComment = e.target.value; }); }
}

async function submitFeedback() {
  if (state.feedbackRating === 0 || state.feedbackSending) return;
  state.feedbackSending = true;
  state.feedbackError = null;
  // Save comment before re-render
  const ta = document.getElementById('feedback-comment');
  if (ta) state.feedbackComment = ta.value;
  render();

  try {
    const res = await fetch(`${API}/feedback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: state.email,
        questionId: state.question.questionId,
        rating: state.feedbackRating,
        comment: state.feedbackComment
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    state.feedbackSent = true;
  } catch (err) {
    state.feedbackError = 'Could not send feedback: ' + err.message;
  }

  state.feedbackSending = false;
  render();
}

function changeUser() {
  state.email = '';
  state.question = null;
  state.error = null;
  state.done = false;
  state.submitted = false;
  localStorage.removeItem('quiz_email');
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────────────────
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('nl-NL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

if (state.email) {
  loadQuestion();
} else {
  render();
}
</script>
</body>
</html>
